body:
  text: 卷下錢婦儲方興病疫飲冷過度合案第一傷寒與時疫下利皆用寒涼之藥未見有用溫熱而愈者錢婦草五歲疫兼感寒飲冷水太多遂日夜瀉五六遍大小腹皆痛痛甚則汗出腹有水聲頭痛午後惡寒右脈小數無力左脈無力更甚以疫邪未出募原之脈原小加以飲冷過度則脈愈伏矣舌白胎渴飲先以五苓散去桂加木香草果一帖痛除瀉止表終不解繼以小柴胡湯二帖而愈仲景云傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯此因表未解而妄下以致下利清穀不止但里重於表故先以四逆湯救其里待里清便既調表猶不解而身疼痛仍以桂枝湯解其表也茲症雖未誤下以多飲冷而下利與寒藥攻下何異但未至清穀不止且兼疫症桂在所忌故以五苓去桂加木香草果而不用四逆湯也意謂痛甚則汗出而表必解究竟不解者一以痛出之汗裡氣閉結終不若自汗調暢而上下表里俱解一以痛止初汗止解外縛而疫邪猶未能潰故仍以小柴胡湯以達之彼系太陽故用桂枝湯此係少陽兼疫故用小柴胡湯只取仲景救里救表之意而不用其方也又儲方興草四歲同時病疫多食連渣生藕且未禁食致腹痛甚汗出不時但未至瀉豫以二陳檳榔草果厚朴一帖痛止復自汗而愈錢婦兼感寒故痛止汗出而猶用小柴胡湯以解未盡之縛兼以達疫方興單系疫症故痛一止而邪即外潰不必用藥解表而自汗出愈也此二症若認為協熱下利而投以寒涼之劑則殆矣梁婦康子疫症合案第二先見之明固為醫人美處然終不若如鏡之照物隨見而有毫無意必之為盡善也梁婦草餘歲生産半月夫患疫即日夜服勞夫方愈便臥疫一醫見腹瀉口渴於止瀉藥中加黃連一錢滯與疫俱閉愈甚復延豫治見其面黃體弱又兼産後勞碌定屬虛症但胃口痛滿欲嘔夜間惡寒無汗此少陽風寒夾滯不出而兼時疫也脈在虛實之間舌無胎思熱飲以小柴胡湯合達原飲一帖下稀糞四五遍覺少快又進一帖惡寒止汗漸出但腹脹滿終不愈前方加枳桔青皮熟軍一帖覺下一物愈大半又小其制一帖全愈服藥四帖共行草余遍並未用補收功康僧子年二十未娶素無疾同時染疫脈弱舌潤黃影膈間微痞豫舍脈從症以大柴胡湯微下之至七日自汗舌黃退身仍熱不安靜身現隱隱紅疹脈愈弱豫思內外俱通脈當出而愈小者真虛脈也身熱疹現者虛火炎也再視小便已如象牙色豫令速進稀粥漸愈若斷以先見則梁婦決當虛而康子決當實矣孰知反是是知無意無必方為盡善之道也按二症喜年少故痊梁婦未有不虛者但虛少實多因年少猶能當消伐之藥實去而虛症未現故愈康子虛多實少故災去而虛症即現因年少未至虛脫幸辨之早速進稀粥救之二症若系老人則亡陽而死矣虎氏母子疫症合案第三感寒與時疫下症為下其火以承一線之陰氣故名承氣湯非下其矢也故趙氏曰今時之醫其意專與糟粕作對呂晚村從而譏之曰此名矢醫也雖然若胃中無積滯之人可一下而痊若村野之人與多郁婦女胃中原有宿積並膏粱之人胃中素有痰火兼之外邪入內與疫邪內發火氣堅縛非一下所能解也子治虎氏母子疫症屢用大承氣下之不解舌雖黃胎潤而薄所下皆稀糞又不合重用硝黃豫意乃素積難開非硝黃症也各下以木香檳榔丸四五錢宿積始去胃中始快蓋木香檳榔丸內有牽牛故能散結若此仲景書下禁丸藥者為下其火當以硝黃滌蕩也此症滯重火輕以湯易丸有何不可乎康華之感寒一案第四康華之深秋感寒首即嘔吐繼而乾嘔數聲出黏涎一口自用發表清裡藥一帖汗後不解至七朝方延豫治豫診右脈小數而弱左脈差強寒熱往來胃口微脹身熱無汗少渴舌白胎豫以小柴胡湯加枳桔蔞仁一帖惡寒止餘症不減前方加二苓澤瀉亦不效去二苓澤瀉加熟軍青皮檳榔服時暫快藥過如舊亦下稀焦糞因素無結糞故也且又不合硝黃豫意乃善飲之人胃中素有膠痰非湯藥所能下初系瓜蒂散症此時已不可吐以滾痰丸三四錢下膠物四遍遂脈出嘔止汗出而愈按嘔家有發表利水和解攻下之不同然攻下系湯劑此症若泥古法直待舌胎黃燥方以硝黃滌蕩反成九死一生之症矣此與前案相似多一嘔彼滯多此痰多耳周開周妻疫症一案第五溫疫論有屢下用大黃至十二兩者豫於周開周妻驗之其人年十九未生育體健兼之胃有宿積下後半日舌復乾燥又以承氣湯下之一醫委之而去余因年少體健舌乾故放膽屢下之共計用生熟大黃五六兩芒硝將一兩佐以花粉芩連膏母蔞仁枳朴青檳等甚夥熱猶不退復發痧又發頤猶出厚膿收口甚速而愈其脈不復記矣繆豐城瘧轉感寒一案第六表侄繆豐城夏月瘧轉感寒服他醫藥數帖不效余診六脈皆弱舌黃燥胎中一線已黑猶寒熱往來時有譫語胃脘不硬不疼余以舌胎為憑且年少體鍵未娶舍脈從症以大柴胡湯下之所下薄糞二次蛔數條而已症猶不退因脈下後仍小不合白虎湯以小柴胡湯加犀連等瘧漸轉輕但瘧來時舌猶乾燥共食西瓜五六十枚凡服涼藥與西瓜則汗出先自額鼻微汗每日汗漸下出一次十餘天方汗至足而愈此症想因誤服麻桂以致津液乾枯症變陽明而少陽瘧邪終不出也病愈後診脈如前方知乃先天弱脈也曹僧患疫得歇止脈一案第七曹僧五十餘歲患疫診得歇止脈然非死症豫細思背後有一大瘤氣血為此阻滯之故用藥得痊今已十餘年其僧尚在也堂兄與謙疫後變痢不治一案第八與謙堂兄時疫將十日人事清明脈弱無神忽滯下如紅膿腥臭不堪是知臟腑已壞也數日而卒朱笠葊感寒一案第九朱笠葊感寒屢用發表清裡藥不愈脈乍大乍小數而無力譫語舌黃燥遺尿大便祕欲飲滾熱茶時豫初習醫因脈虛熱飲不敢再進寒涼消伐之劑遠延兩名醫一與以連理湯一與以六君子湯愈劇後不服藥止頻飲松蘿熱茶數日後漸覺清明自主以承氣湯下膠糞一遍遂漸愈是知脈虛者屢用發表中氣虛也思熱飲者滯化為痰中氣弱不能利痰故借湯之暖以運蕩之也遺尿者心移熱於小腸也標雖虛而本卻實故現舌胎干黃仍歸攻下而愈也潘國彩疫症一案第十潘國彩時疫脈實大舌青紫時厄逆思飲滾熱茶素善飲目珠忽微黃豫用發表清裡藥有汗不解蓋七日自汗症也彼欲急效延遠來一醫視之彼認為雜症發黃遂用薑桂耆朮茵陳半夏黃連等且勸頻進飲食以致譫妄拈鬚舌強不語延朱笠葊江有聲皆未至復延豫視撬開齒縫水始得下數日前舌有微胎擦去故視舌雖干而無胎又曾胃口飽悶以滾痰丸下過因舌乾無胎又曾下過不敢用承氣湯惟以石膏滑石頻煎與之以冀自汗次日頭汗至頸而還仍與前藥又次日汗方出透則所延之醫皆至矣里症尚未解議與半夏瀉心湯去參棗加熟軍微下一遍改用清涼藥數帖而愈因未大下後草餘日不大便服潤藥與蜜導皆不效復飲熟軍元明粉而愈是知朱笠葊之下症定於舌潘國彩之下症定於脈耳噫微矣哉余思此二實症皆喜熱飲者因胃家原有痞結故也得熱則開得冷則愈結故如是耳五瀉心湯皆乾薑合芩連其意可見朱笠葊胃有舊疾潘國彩厄逆不休皆痞結症也笠葊痰滯俱有故舌黃燥國彩素無積聚止有痰飲礙其升降書云中多痰飲則舌胎微以痰飲微胎先曾擦去故舌雖干而無胎至於舌色青紫想因氣結不行以致血亦凝滯歟秀峰僧疫症一案第十一秀峰僧染疫舌厚黃胎不譫語胸膈痞滿脈弱豫舍脈從症用承氣湯下之而愈須知此脈非先天弱脈即為痞滿所伏且知舌厚黃胎亦有不譫語者王東晹疫症一案第十二族兄東晹善飲體健染疫脈弱胸膈痞滿舌黃潤豫舍脈從症用小承氣湯屢下之共用生熟大黃約二兩餘石膏一斤枳朴數兩雪水數鉢至八日忽發戰思冷飲家人惟執以熱茶催汗故頭汗而止然漸愈後食復亦八日發戰得頭汗而解外涼而內熱不除復以大承氣下宿垢甚多而愈忽熱傳肺咳嗽不止用麥冬一味愈豫聞江有聲言八日自汗症多不穩仲景云頭汗劑頸而還當發疽由此症觀之則二言皆不足信矣陳雙頂疫症發斑一案第十三陳雙頂時疫發斑論脈則浮而無力當補當表論症則人事不明舌黃燥當下然有假脈而無假燥黃舌也其脈所以如此者乃臟氣被伏不能行於腑惟腑氣猶能往來故現此象耳以承氣湯下之而愈按斑症有發表和解攻下雙解溫補之不同當以里症為憑不可執定下則斑陷一説也凡病內症皆重於表不獨斑症為然如看銀色面底可假而夾口斷不可欺也吳婦感寒一案第十四吳婦忽腹大痛大瀉醫投以消滯行氣之品愈甚豫診脈浮數且兼表症知為太陽陽明合病也但仲景止云下利並未言痛然症與書每每不能恰合當以意消息得之仍投以葛根湯汗出而愈丁赤晨疫症一案第十五疫症非比感寒感寒汗後不愈則有白虎湯白虎湯不愈漸轉三承氣湯或桃仁承氣湯疫症至七日內邪外潰輕者得汗立解身涼渴止重者雖汗不愈必有下症其下症有三輕者胃脘微硬微渴舌黃影不思食以小承氣湯小其制生熟軍微利之重者舌胎黃燥腹滿痛譫語飲冷二便不通脈沉數有力乃大承氣湯症此下症之明著者其有下症隱微者不易明也前虎氏母子康華之朱笠葊潘國彩皆言之矣至於丁赤晨病疫汗後不愈舌無胎微有潤黑影脈微數無力不大渴腹不滿痛二便如常豫用清法治之不愈遠延一醫至認為虛症治以香砂六君子湯加炮薑服下亦不驟劇數帖後愈覺不寧辭去復延豫視時已半月細細審問云腹中如有物狀小便甚疼豫思疫症豈可熱補謬不待言但下症不明姑以清涼之藥加熟軍以解藥毒因其腹中如有物狀少加枳朴服後遂下血塊方悟為蓄血症也但不知本系血症亦不知誤投溫熱所致茲後遂用導瘀理氣涼血之品漸加脾藥下血半月至末一次下瘀血半鉢隨暈絶灌參湯二錢復蘇茲後並無血下繼以脾胃藥收功蓋蓄血症有譫妄如狂喜忘屎黑小便利發黃腹硬痛漱水不欲咽脈沉結等症此症小便反疼餘症並無實難辨也若不細心體察能免誤乎丁繼寬疫症一案第十六誤醫赤晨之醫醫赤晨大郎繼寬不可沒其功也繼寬同時染疫汗後不解脈較赤晨少健浮沉著中腹不硬痛舌生灰色潤胎書云黑潤胎屬虛寒從未有言灰色潤胎當用硝黃者豫不敢下亦不敢補惟用清法俟其變症彼以大承氣湯下之下後胎少退熱少止仍不思食兩日不下灰胎腹生又下之所下皆膠滯之物如此下五六次方愈此症此脈此治法彼云亦未經過乃出心裁豫始服其才識後見誤醫赤晨又竊怪其粗庸雖然辨繼寬症易辨赤晨症難也繼寬年方二十未娶酒量食量皆佳非實症而何赤晨年已五十勞心焦思八口待食敢作實症治乎是知此二症脈症皆不可憑惟以意消息得之醫之為道難矣王益貞痰瘧不治一案第十七重侄益貞年將五十患痰瘧時咳膠痰甚多有一結氣上則咳甚而胸脅無病下則咳止胸脅不快厄逆不時舌厚灰色潤胎豫治以清痰下氣解表之藥漸愈因多食經宿酥油燒餅遂復餘隻消導不敢攻下終未愈轉薦朱笠葊治之亦不效終斃須知此亦系下症與繼寬大同小異二人之舌無異者皆善飲酒想痰滯之胎非燥屎之胎書云黑胎屬虛寒此症終未遇縱有此症必黑而薄決不灰而厚也然赤晨蓄血症舌胎又何得黑影乎噫微矣哉繆子尚母感寒一案第十八繆子尚母年七十夏月感寒豫視時已過七日矣微渴思熱飲二便如常舌白胎厚如積粉清晨猶惡寒少陽症也右脈勝於左里症重於表也以大柴胡湯加熟軍微下之服至三帖惡寒止四帖內熱止共行稀糞六遍表裡俱解而愈感寒白胎原系少陽症但未見如此之厚溫疫論云邪在募原當舌見白胎邪重者胎如積粉豈重疫而兼感寒者耶若然則年老之人何能延至十數日尚愈乎若云積滯之胎則胸膈並不硬痛噫此所以難辨矣徐芝三舌黑胎一案第十九傷寒時疫舌胎黃者胃實可下燥者胃將干急下之黑者胃已爛不可治姨兄徐芝三屢食角黍復感寒舌胎黑而厚光如京墨然不燥猶能伸縮脈滑數有力人事清楚論舌則不可治論脈與人事則可治遂以白虎湯合小承氣湯治之少頃自汗繼以大便而愈胃既不爛舌何以黑妙在黑而光且不燥故胃未爛耳此又舌胎之一奇也細憶所驗諸舌胎或白或黃或黑或灰色但厚者皆系實症稀而流者雖實亦虛症也潤以茶水雖干而能伸縮者可治不能伸縮者不可治也舌乾下後津液不生者亦死症也雖然於不可把握之中而實亦有把握之機在焉若非閲歷深久何能知此漁人六月感寒用麻桂一案第二十豫昔糊口海澨時六月漁船往海取魚適雷雨大作漁人皆著單衣感寒者十中八九豫舍時從症盡以麻黃湯加減發汗有周姓粗知醫道竊議之見人人盡愈詰豫曰六月用麻桂有本乎豫曰醫者意也仲景必因病立方豈隨時定劑有是病便服是方焉可執乎蓋汪洋萬里雷雨大作寒氣不異冬月況著單衣感寒為何如哉故豫盡以麻黃湯加減取汗而愈者意也得其意即本也若必事事親見方為有本則日亦不足矣張婦感寒一案第二十一前有下症當以舌胎為憑之論茲又有舌胎不足為憑之驗矣張婦春初感寒表未解一醫用三黃石膏湯四五帖轉增危困至十二朝方延豫視左脈甚弱右脈少強皆微數無力舌乾無胎無刺全似津液不生之虛干舌按胃口微痛不按則不能三日前曾食飯一碗病初瀉下數行問其病情耳聾不知若以脈與舌斷之症屬不治然年少素無他疾不當有此虛症且神情不亂豫舍脈舌而斷之以理以小柴胡合小承氣湯與之未愈轉治於蔣天邑天邑以豫方加倍一服全愈前潘國彩有此舌而下愈者乃膏粱善飲之人必有痰飲故有此舌也此乃藜藿之婦痰飲何來想因過服涼藥凝伏太甚火氣不能上達於舌耳彼脈大而有力者因誤服熱藥此脈小而無力者因誤服涼藥然外有寒熱之殊其內伏火則一故皆脈數舌乾攻下而愈也蔣星辨僕人時疫一案第二十二蔣星辨僕人草餘歲仲秋患疫一醫始以麻黃湯發汗終無汗一醫數下之皆稀糞不愈豫視時已過經矣肚皮黏腹譫語口渴舌無胎脈虛數屢服清火藥小便已白而餘症不解但臍下築築動氣失氣甚臭大腸必有結糞也以大承氣湯小其制下結糞數十枚繼自汗而愈此症舌無胎小便已白脈小數無力肚皮黏腹全似虛症惟譫語失氣甚臭無汗臍下跳動是為下症內經臍下動氣不可汗下之語不可泥也繆端生感寒兼積痰一案第二十三繆端生年五十餘季秋初旬感寒自以三合湯解表遂時時汗出脈不數重按全無舌微白微渴人事清楚失氣不臭但胃口飽悶咳吐膠痰舊有頭痛症痛作無時汗出則愈然已過經外感全無乃痰厥頭疼也痰厥時則經絡壅塞汗出則經絡少通而痰下故愈豫因年高且脈症皆虛雖胃口飽悶不敢用承氣湯以平胃二陳加枳桔蔞仁射干熟大黃與之數帖咳止而飽悶如常大便不通加玄明粉二帖亦不通改用滾痰丸四錢下白物闊二指長二指者兩塊又服三錢下痰滯甚多但小便清晨仍赤時欲昏去恐虛脫只得令進稀粥然不大餓大便復半月不通腹中攻注始終失氣不臭導以蜜箭二條出結糞十數枚仍用熟大黃檳榔枳殼玄明粉等連服二帖再導蜜箭方下薄糞腹中攻注終不清復零進滾痰丸兩許下厚痰數碗胃中尚有硬處然痰無盡攻之理以六君子湯合三子養親湯重加花粉直服至小便白方用歸芍六君子湯調理平時皆有微汗至十一月二十五日冬至時已臥床八十天矣於二十二日忽大汗三晝夜不止至冬至日方止渾身俱發青點大小不一復延余視豫問食量並內症何如彼云一宿可食七頓每頓食粥二小碗餘症並無豫答不必服藥亦不必往視當自愈後果俱結薄痂而愈此因正氣已充兼之天地一陽之氣來復而平時因痰壅滯之物自出即前汗出頭痛則愈之義也共約用生熟軍三兩元明粉一兩滾痰丸三兩下數十行去膠痰結糞一大盆此症脈症皆虛惟胃口飽悶腹中攻痛為實總緣痰症多怪症怪脈也然痰症每多人事不明而此反清楚久病大汗不止為亡陽而此卻發斑青斑為胃爛而此反屬病愈種種奧理則又非淺識所能解矣錢守國妻虛疫一案第二十四錢守國妻病疫服他醫藥數帖不效余視雖年少體壯診脈甚弱日夜瀉數次舌無胎不大思飲時微汗胃不硬痛余以補中益氣湯當歸換白芍數帖而愈若謂溫疫無補法則殺人矣梁母虛疫一案第二十五梁宏九令堂母死染疫脈數而弱寸口帶促豫與以清暑藥不效復延一老醫時疫者以為溫疫無補法大劑白虎湯與之煩躁更甚後延吳克憲先生先以附子連理湯救其失次以參耆朮草麥冬五味而愈何四兄虛感寒一案第二十六何四兄冬月感寒六脈微弱舌淨不渴不飢小便微黃而清胃無痞滿微喘而嗽虛症也前醫尚有藥二帖令服盡再診視豫取視之乃清肺平胃發散之品若服盡則難救治矣豫用補中益氣湯因過服涼藥少加薑桂以救其失二帖而愈王禹訓內人虛疫不治一案第二十七王禹訓內人母死染疫脈大鼓指豫以溫疫藥治之後忽脈變小弱人事不清舌上卷七日而逝以上數症觀之凡內傷復感時疫者雖脈促脈鼓指猶未可遽斷為實症也是知脈促與鼓指者非真也假也緣脈道不能體會故也可不慎哉可不懼哉丁圬者虛疫不治一案第二十八丁圬者初夏染疫豫視時已經八天無汗脈小數無力胃先不寬醫已下過大小腹皆軟舌胎黃潤而薄雖飲冷不多多痰齒縫出血不上然人事清明舌能伸縮而語雖虛非死症也豫憐其貧送以六味地黃湯加牛膝鬱金貝母麥冬之方前醫以為不然仍投以三黃石膏犀角之劑數帖而斃先兄虛感寒不治一案第二十九先兄痢初愈感寒脈小數而弱時惡寒熱微汗豫以為虛時豫初業醫不敢專請他醫兼視先兄適飲番瓜湯醫視舌黃誤認為胎惟以無參小柴胡湯反覆治之而斃死之時遺言清明醫方悔為虛症也哀哉豫與內子虛疫合案第三十豫夫婦辛巳歲母方逝即同染疫一醫與豫以發汗藥衣被皆濕病毫不退脈浮數無力豫素有陰虛失血症口漸出血微渴豫令諸生多飲天水茶與溺頻飲之漸次清明因久不大便不思食然無下症一醫以滾痰丸取結糞數枚而思食又一醫與內子小柴胡湯一帖即稀糞不禁不省人事復延吳天諭診視豫言素有脾虛症隨與補中益氣湯而愈是知凡病當因人而施先固其本不可專治標病也徐明子虛感寒不治一案第三十一徐明子素有弱疾大肉瘦盡復感寒舌黃胎薄而流轉如荷珠狀脈數而弱口渴豫不敢治他醫治之終斃是知黃胎亦有虛症者十三總族媳虛感寒不治一案第三十二十三總族媳感寒四日汗愈會大風雨垣頽復感寒至八日方延豫視舌白乾胎而短譫語唇裂口內全無津液不渴胸下微痛而軟四五日不大便小便尚有左脈欲絶右脈豁大豫思舌乾當黃當渴今反白而不思飲者氣虛液稿也舌燥譫語脈當沉數反豁大者亡陽之漸也唇裂者亦虛火泛溢也雖小便尚有本屬虛症無實火不得以此斷為可治之症種種虛症雖四五日不大便胃口微痛敢下乎縱欲治之亦系生脈散凡遇貧而且愚之人不可令其服參豫令被另延高明不二日而卒姚爾玉郎虎墩南莊一人虛疫合案第三十三姚爾玉郎十二歲疫兼感寒豫視時已半月矣脈虛數與大柴胡湯而愈越三日食糖復遲數天大汗如雨劑腰而還遂不語角弓反張眼瞞紅雲然舌燥胎皆化血水而出內出潤舌豫投以滋陰藥一帖繼飲雪水而斃虎墩南莊一人病疫舌胎浮起內出潤舌但脈不應指言語不明辭未用藥越一日卒須知此二症皆可治生脈散症也凡外感時疫舌乾而死者不可治以其陰陽皆絶也舌潤而死者皆可治以其陰氣猶存尚可以配補陽之藥皆醫失補之過也此症一不語一語不明者補氣不足也一角弓反張者氣血不運也舌胎既浮潤舌已出邪火漸消津液漸生但脈弱而元氣不足無接濟之力蘇而不蘇故復死也若服以生脈散之類自可陽生陰長而漸至氣血周運清明思食矣朱笠葊大令愛三令愛産後咳嗽合案第三十四朱笠葊大令愛向年冬月生産産難之極遂咳嗽不食商之於豫豫謂産難氣血大虛虛火炎上故令咳嗽不止非溫補不可笠葊少進參耆覺效遂大溫補而愈從此氣血虧損至今十載未孕今歲三令愛仲秋發瘧以常山截住愈一日即産産後覺熱肩手露睡一夜小腹微痛服導瘀藥一帖痛止三日即起行動作如故飲食頻進至六七朝忽身大熱思飲咳吐膠痰寒熱往來漸至耳聾譫語時笠葊在海陵延豫診視左脈浮數無力右脈沉細似乎孤陽上僭之脈然氣勢不餒面不紅醒睡皆無汗胃脹欲嘔明系瘧邪未清兼以復感微寒仍入少陽又兼飲食頻進雖産後實陽瘧也熱則揭去衣被故無汗而加重左脈浮數者症本少陽也重按無力並右脈沉細者為痰滯所伏也咳吐膠痰者肝胃二經實火上衝於肺也當以清脾飲加枳桔熟軍治之伊翁夫伯皆知醫道聞豫言愕然另請江有聲視之有聲與豫同見然所用亦甘寒之品不效豫云若先生避議則瞑眩之劑終無人用矣遂立加減小柴胡湯而去午後臉忽微紅乃柴胡之力伊等以為孤陽將越驚慌怨怒自是瘧門之藥毫不敢用越數日舌胎乾黑擦去旋生方悟豫言不謬復延豫治豫以小承氣湯熟軍用二錢加枳桔蔞仁貝母麥冬二帖去結糞宿垢甚多繼以四物湯加貝母麥冬桔梗橘紅二帖熟睡大汗而解後飲食不禁舌胎仍黑時已滿月伊夫以前方加玄明粉五分下之而愈又食復時笠葊已回又以熟軍下之而愈二症俱系産後咳嗽虛實天壤矣韓婦産後一案第三十五韓婦生産極難數日後因酷暑少飲西瓜水一醫用附桂耆術反增厄逆而時暈絶一醫投清暑甘寒之品而身大熱豫診脈甚弱細揣病情胃中又有積滯是脈固當弱然亦因滯伏所致今以附桂與耆術同用熱留上焦自助痰滯暑氣為虐以增厄逆而時暈絶耳後醫以為過服熱藥而投以清涼矯弊殊不知産難而復飲冷下焦虛寒已極而復用清涼之藥上焦雖宜而漸至下焦下焦愈冷孤陽逼上而身大熱勢必脈轉浮數頃刻飛越而死矣豫投以附桂薑吳群隊下走大熱之藥不使少留胃中更少加檳榔木香以其下氣如奔馬也二味雖氣分下藥然入血藥中亦能下達血分且檳榔少許只破胃中滯氣不致誅伐無過服藥後下宿滯二遍減去檳榔木香加二陳耆術共三帖全愈觀二醫之方似覺清通於豫然彼不效而豫反效者豫中肯故也陳良友妻郭育材婢俱三月墮胎合案第三十六陳良友妻每三月墮胎茲墮雙胎信老嫗言以胎焙灰酒調服可永不墮不令人知知則不靈故家人醫生皆不知也豫診脈大有力以為胃有積滯因産後不敢大克伐微與消導不效及更請吳克憲先生兼治始言此事茲後方敢大膽克伐蓋最補有毒之物兼以雙胎之多濟以火煅酒下其熱可知因痰火不能遽清年餘方愈郭育材婢因瘧墮胎亦三月蓋三月墮胎不致大虛且瘧未止下敢遽補惟以小柴胡湯兼四物湯加減治之不效後朱體云以附桂而愈是知此二症皆三月墮胎一虛一實相懸天壤豫斯時醫學尚未老煉成功他人言之汗顏滋甚矣朱帝簡妻與內子生産合案第三十七朱帝簡妻將産血下不止心煩亂無緊陳豫令且服獨參湯一錢彼信庸醫穩婆之語恐補住胎與瘀血止與三分心煩亂少止告豫止飲三分之故豫急令服完彼又止與三分血止又告以前故豫又急令服完少頃緊陳至而胎下矣因其貧甚後未補益竟成羸疾數年而卒噫向使不敢用參命在頃刻安望數年乎此症若執定芎歸湯加人參則血亦不能止妙在獨用人參以生氣固血血止氣壯而胎下矣豫內子生第五胎時已久患脾瀉緊陳不至大汗已出預以圓二斤濃熬盡飲之汗止而胎下矣後君瑞兄媳惡露不下用木香檳榔枳殼玄明肉桂大黃破氣破血以行之此胎不下一用獨參湯生氣固血一用圓湯壯氣運血以達生之是皆有至理存焉耳繆婦墮胎一案第三十八婦人科以四物湯為通套之藥隨症加減治之稱家傳而貴妥當殊不知其不然也繆婦懷孕兩月值太姑去世悲泣過度遂致飲食不進胎墜痛豫以調脾理氣消痰之品治之年幼不遵調攝又時著氣惱故不效往母家就醫醫惟治以四物湯兼保胎之藥飲食愈減血漸下小腹墜痛愈甚復回延豫診視脾胃之脈弱極然胃口壅塞作嘔以香砂六君子湯加枳桔開提之二帖思食減去枳桔又二帖飲食大進下焦痛止而血塊反下繼下一物大如鵝卵內如蛋白狀是知胎已久壞因胃氣痞結以致下焦氣亦不通故墜痛不下服此藥得胃氣運行而瘀血死胎有不與之俱下乎若再服四物保胎等藥豫不知其變為何症也王有成妻産後惡露不下一案第三十九族弟有成婦産後小腹痛脈症皆虛貧不能用參豫以桂附黑薑元胡吳萸牛膝等加耆術與之人見此方爭議之有成信之不疑一帖而痊王君瑞媳産後惡露上衝及孫婦疫症墮胎合案第四十族兄君瑞大媳産後惡露不下豫始用暖下焦散瘀血藥不效繼而惡露上衝嘔痛不食豫視脈體皆實問其飯量可食升米胃中必有宿滯氣閉不通以致下焦之氣吸而不行瘀血因之不下矣遂與檳榔青皮枳殼木香肉桂元胡桃仁等加以九蒸大黃二便俱下惡物臭不可聞者而愈又孫婦甚健疫症墮胎惡露不下參以下症亦以熟軍下之而愈此兼時疫又有少別雖然使未閲張子和書敢斗膽若此乎一醫聞豫言以為此法可常行遇一産後惡寒發熱竟與寒涼發散之劑幾至立斃豫與朱笠葊用參附薑桂而愈噫若見解少有未透此法可輕試乎繆僧外感後及豫瘧後不思食合案第四十一感寒時疫人只知其愈後早食之害而不知其遲食之誤繆僧感寒醫妄下過損胃氣全不思食豫視脈症皆虛自言口渴身熱實不渴不熱也此乃中氣浮越再視小便已白令與薄粥漸思食而愈豫昔患瘧餓損胃氣全不思食但覺胃中作犯強食稀粥則犯止茲後作犯便知其為飢也如此數日終不思食乃以蝦米豬油蔥醋作粥食方引開胃氣覺餓此二症若待餓香方食則至死不餓矣趙公著徐氏子陰症合案第四十二仲景云少陰脈沉小便白豫治趙公著徐氏子二症俱內中陰寒之症少腹痛痛甚則汗出此一定無疑之症餘症則一瀉而鼻衄口渴舌有白胎一不瀉不渴而唇皮裂卷至於脈皆浮數小便皆黃俱用附桂吳萸黑薑元胡牛膝乳沒而愈此乃下焦陰寒逼火於上故見此脈小便黃者二人原有此舊疾凡寒症久郁不散皆變為火然此處非比他處雖有寒火夾雜仍當用熱藥以散之是又不可概以脈浮數小便黃鼻衄唇裂謂非少陰症也蔣子和趙公著徐氏子脈症類白虎湯合案第四十三類白虎湯症者誤服白虎湯立斃辨之之法雖渴而喜熱飲且少舌無胎縱有系白胎小便清白脈數大無方然孰知其有不然者蔣子和先生吐血將危豫診其脈數大重按有力及趙公著徐氏子直中陰症脈皆如之且唇焦鼻衄小便黃赤是脈症皆難辨矣若不細心體察能免毫釐千里之誤乎賁大成久嗽一案第四十四鶴岑賁先生詰豫曰豫男振咳嗽數載始而先生以散表愈繼而屢發先生或仍以散表愈或以理氣下痰愈或以清肺愈或以補腎愈或以補脾愈或以交心腎愈或以補肺斂肺愈然屢愈屢發終不盡愈今春往雉皋張加民先生謂左脈小於右斷為肝鬱所致君以白芍三錢始而大效及至家久服又不見效敢問何説也豫曰令郎之恙得自夏月當風洗浴故始以散表而愈愈後不善調攝以致屢發屢愈日久肺竅不清已結窠囊發則痰喘氣急俟服藥多帖痰消大半則病愈大半矣然痰根盤踞如瘡生管不能盡去窠囊漸漸積滿則又發矣然無外感內傷致咳之由則亦不發其發之之由又非一言可盡者肺為嬌臟不容毫髮受寒咳受熱咳飲冷咳飲大熱咳又為五臟華蓋凡五臟六腑之水火濁氣上干於肺者皆致咳故內經有五臟六腑之咳咳則周身之氣血上奔最難遽止咳為進少出多吊動腎氣最易變虛故致咳之由最多而治咳之方鮮效也令郎或仍受風寒而發者故仍以散表愈痰積既久堵塞肺竅喘急悶絶忽然驟發命在頃刻者故以理氣下痰愈肺始受寒久則變熱發時微寒既經表散惟熱獨存故以清肺愈然肺為腎母母虛不能生子子虛令母益虛金水不能相生其咳愈甚虛則補其子故以補腎愈但清肺補腎之劑久服傷脾泥膈飲食減少脾為肺母土虛不能制水水泛為痰而更咳虛則補其母故以補脾愈有讀書作文用心大過致夜不寐心腎下交或夢遺相火上炎而咳者故以交心腎愈久發不止肺氣虛耗故以補肺斂肺愈寒士境遇往往拂意易動肝怒故張先生又以抑肝愈設若嗜煙酒炙爆房色過度勢必又以滌蕩中宮或以獨參湯鹿茸丸黑鉛丹八味丸等而愈也既有痰根在肺則凡所以致咳者皆足以助之故用藥有如此轉變也張先生之方不過一時偶中至於病情變遷窠痰復出又不效矣至言左脈小於右斷為肝虛若然則為肝之陽虛何得又用白芍而效乎還知是右大於左為肺家本病痰火久嗽宜於酸寒故奏效耳若洞明此理則對症用藥無不獲效若執一隅之見一時之方故有始效而繼不效若再強進則疾痼而難救矣欲愈之法必須外避風寒暑濕內戒七情六欲視世事如浮雲降心如稿木寒灰縱發亦稀而且輕漸漸窠囊消落再以丸藥培其根本日久自然全愈若不遵調攝專恃藥餌或醫者見聞不博博而不化化而不神吾未見能全愈也先生以為然否孫伯魁咳嗽一案第四十五圬者孫伯魁歲草余體素健傷風咳嗽將一月忽痰喘臥床不食脈微數而弱豫舍脈從症治以消風驅痰之品二帖嘔痰甚多然餘症不減脈亦如前豫思風邪宿痰俱去脈當出而症當減今仍如前者真虛症也遂以六君子湯加歸芍龍眼肉與之喘嗽漸止而思食四帖全愈問其平日過飢則汗出而顫其中虛可知勿謂少年藜藿之人無外感虛症也賁大成久嗽繼案第四十六大成賁世兄咳嗽二年時發時止發時氣道阻塞喘急不堪服散風降氣下痰潤肺藥數帖咳去痰五六粉盒方氣平漸愈今發未經一晝夜服前藥八帖間有加參耆者毫不見效伊父鶴岑先生醫技已窮商之於豫豫診左脈甚弱右脈沉而有神非死症然手足冰冷汗時出痰只出一盒余不能出滿腹痞塞豫思脾胃強則五臟之氣皆強脾胃弱則五臟之氣皆弱況脾為肺母未有胃氣充足旋轉而肺氣終不行者以香砂六君子湯木香易沉香砂仁易白蔻與之服下果效即減去白蔻恐肺中伏火繼出仍加以旋花桔梗貝母蔞仁杏仁等再以他藥轉換收功須知此症胃氣雖不大實亦不大虛但不充足不能激發肺竅之壅塞耳故一帖肺氣少輸前方即為之加減矣丁妻積聚一案第四十七丁妻五十餘歲素有胃疾忽然厥倒上腹飽脹二便不通脈沉遲有力豫用消伐藥多加檳榔則氣下墜陰孔挺出小便愈閉檳榔換桔梗則下焦少寬而大腹飽脹如鼓以檳榔丸合滾痰丸四錢再以湯藥催之下積滯五六遍則脈有時數大矣為其痞結少開伏火少出也然久積之症非一朝所能去正氣亦非一朝所能復若再用刻伐則正氣愈虧滯愈難去將必變為中滿而後已當用半補半消或屢補屢下殿以純補之劑日久自然全愈丁姓逞才妄議見豫繼用補瀉兼施謂理相矛盾豫置不辨辭去後更他醫用藥阿其所好至今一載未起附此以見積聚之症而有陰孔挺出二便不通腹脹如鼓之奇者繆姓積聚一案第四十八今世之談醫者皆云賤霸而貴王珠不知王道不當流而為迂用霸得當正所以全王也非霸也權也試問孔子夾谷之會而以司馬隨之權乎霸乎醫明此義方可稱為王道不然乃宋襄之愚安得謂之王乎繆姓胃患積聚六七載矣發則數月方愈系膏粱善飲之人積滯半化膠痰不必言矣舊歲疾發數月不愈一醫以為久病無實惟執補正而邪自去一語所投皆溫補之劑豫往視見其形肉已瘦信乎當補然脈重按滑數舌厚黃胎二便不通此症當以參湯下滾痰丸但久服溫補取先補後瀉之義兩日陸續單進滾痰丸四錢止瀉兩遍遂覺胃快前醫復至譖豫大傷元氣速進補劑遂補而痊醫家病家盛傳豫過豫置不辨試問從前數月皆補何不愈乎何以知豫瀉後不善補乎今歲復發彼醫仍補數月豫往視脈仍滑數有力舌黃且黑然大肉已盡較上歲更憊矣豫不覺為之淚下雖欲仍進滾痰丸不能救矣噫可慨也夫彭彧卿內人結氣一案第四十九彭或卿內人腹中舊有結氣或上或下上則不食下則小腹墜痛時食粥一月矣右脈數大如外感狀左脈少可皆重按無力細審並無外感經云沉而無力為氣此脈反浮數乃中氣大虛兼以結氣上攻之故與以香砂六君子湯大效飲食漸進然結氣終不愈後加吳萸蕪荑而愈朱道人血淋一案第五十朱道人年六十餘患淋遍服利水藥不效豫思年高氣弱不能運化兼以暑熱故爾遂以補中益氣湯加牛膝車前赤苓澤瀉等一服隨出瘀血半碗先時人己皆不知其為血淋也及見出血道士張伯傳以為豫藥所致歸罪於豫豫云用補藥下血此係佳兆彼以為不然令道人回家調治恐死纍己未半月康強如故而至矣楊母暴吐一案第五十一楊壽明令堂年將九旬素健忽暴吐脈滑數有力治以消導清涼而愈是知有病則病受之不可因年高而遂廢消導一法也但中病則止不必盡劑耳王大使酒疸不治一案第五十二虎墩大使王爾玉年將四十患酒疸飲食減少形容瘦削六脈沉小彼云本系六陰脈豫謂無論本脈病脈皆當以補脾胃為主而兼以清痰理氣導濕熱為治但此藥功緩彼因上司遠調河工復延一醫純用寒涼退疸之藥至家豫往視自謂黃已退病已愈豫見形容羸瘦精神短少脾胃必更傷矣未旬日果一中而卒豫吐血兼脾瀉一案第五十三豫於三十二歲吐血復發時又有茶積作瀉服地黃湯則瀉甚服耆術則吐血不止脾腎兼治則俱難速效思以京墨濃蘑沖滾湯泡炒米食二病頓愈豫身親歷諸病服藥之案第五十四豫前云正氣實者無症是虛正氣虛者無症是實此語非臆説乃豫身親歷諸症而驗之也患疫飲童便愈出痘服六味地黃湯愈患瘧與痢服補中益氣湯愈傷食服香砂六君子湯愈牙疼服八味地黃湯愈疸黃以枯蒜煨肉食愈結腸多飲豆腐漿愈瘧後不飢以美味煮粥食而飢然稟賦如豫乃百中一二也陳輔廷子少腹痛一案第五十五痢疾之痛在少腹以其大小腸俱在少腹也木匠陳輔廷子孟秋少腹忽痛一鹽商乃廩膳生書方送人人意其醫道必通求方者衆豫偶見方內有附桂炮薑問其症乃云少腹痛某以為陰寒故發此單豫思盛暑而服大熱之藥若少有不真則殺人於俄頃矣豫為親視乃痢疾將發而未出遂用導滯湯一帖血痢乃出後以痢藥收功蓋醫道貴明理博學閲症三者缺一不可儒者固明理矣奈少博學閲症何又有痢疾已發而小腹痛大腹更有未變痢之食滯而作痛者又當以導滯湯加桔梗厚朴青皮治之外此更有大小腸癰並少腹冤熱諸症皆不可用熱藥醫道豈可輕視哉周自西佃者痢疾一案第五十六周自西佃者歲卅余瘦而健滯下半月餘一醫以為形瘦久痢自當補澀遂轉增逼迫求治於豫診脈滑數有力猶能徒步十里而至雖久痢未虛不但兜澀腸中未清之痢胃中尚有積滯未下仍以消導攻下竟未繼補而愈繆姓寒疝兼痰火一案第五十七繆姓體素健六脈純陽膏粱善飲素多痰火年五十得寒疝症今已十餘載矣偶觸微邪即發有一年數發者有一月數發者發則寒熱往來脈愈大而痰愈甚渴飲疝腫痛或牽引腰痛豫每以小柴胡湯加青皮檳榔花粉一帖汗出渴止而愈今歲復發適豫他往醫等惟清痰火不兼解表降氣以年老再娶腰痛認為腎虛加以補腎之藥數帖後經絡愈滯腰疼不能展轉豫還視之仍治以平日所用之藥但因日久外邪已散少用柴胡只取入肝不取解表加威靈仙一錢豁痰散結腰疼遂減大半餘症俱減然此藥不敢再服只得以平和藥調之兩月始愈愈後詰豫以理豫曰夫易於外感者屬表虛腰痛屬腎虛年老屬虛晚年再娶屬虛久病屬虛時發屬虛膏粱善飲多虛七者誰不知之至於似虛而實實則又不易明矣蓋人之元氣充塞乎一身周流無間若有一處之結則必有一處之不充矣小腸膀胱太陽經主一身之表故外感先從此經見症既有疝結膀胱之內則氣自不充乎膀胱之外故最易外感也此雖表虛因結而致非真虛症也邪既感乎膀胱之外則膀胱之內疝氣愈結而痛內外勾結不散且久積之疝寒變為火兼以表熱則中宮痰火相引愈熾故脈愈大痰愈多而渴飲若不用小柴胡湯以解表花粉以化熱痰青皮檳榔降氣下痰而兼下破疝結何能得愈乎邪感太陽而用柴胡入肝者何書云疝乃受病於肝而見病於腎此腎字當作小腸膀胱經言故取柴胡入肝透膽而治其本則膀胱之邪不攻自解矣其腰痛乃膀胱經本症為風寒把持而然痰襲於腰亦致腰痛足下腰疼須知二症皆有豈可補乎古方治腰痛以威靈仙煨豬腰食之今屢妄補其腎豫又何復輔以豬腎哉日久之病而一帖頓愈大半者以此足下其知之乎豫大小腹氣痛一案第五十八夫痢疾之疼為久積黏滯大腸氣亦為之阻滯然正氣終伸久積必去剝腸而下痛難忍也孰知暫有之滯先在於胃胃氣阻滯而疼繼而下至大腸則大腸之氣亦為阻滯而疼即傷寒陽明症繞臍疼之義也不可以其在少腹而誤認為陰寒之症豫於癸卯初夏過飢飽食蠶豆以致氣閉於胃至半夜方疼清晨連服平胃快氣藥二帖皆嘔去絶無宿食繼而下至大腸則小腹痛甚不能展轉高語咳嗽皆不能下以檳榔丸二錢然所下皆薄糞又非傷寒陽明症繞臍疼之硬糞可比豈豫年老氣弱雖稀糞而氣亦為之阻滯歟數行而愈次亡兒久瀉一案第五十九次亡兒久瀉不肯服藥貧不能用參以蓮肉去心炒脆同炒米磨粉白糖滾水調服數次飽食而愈童天立幼時久瀉一案第六十久瀉不止而用八味地黃湯者前人言之矣為其久瀉亡陰而於補陰藥中加以附桂水中補火以生脾土茯苓澤瀉以利小便且茯苓山藥亦能補脾萸肉酸收即白芍治瀉之理而性溫濟以地黃丹皮之甘寒自能補脾陰而奏效也至於六味地黃湯治瀉從未之聞童天立十二三歲時久瀉不止脈浮數無溫補之理豫用六味地黃湯四帖而愈蓋久瀉亡陰而童子純陽不必用附桂而亦能奏效也內人脾瀉兼氣痛一案第六十一內人素有脾瀉氣痛二病只可補脾行氣雖年久不可用澀劑澀則氣愈結而痛其痛居大小腹無常治以香砂六君子湯加以白芍補脾陰蕪荑散久積之氣肉桂附子吳萸炮薑大補脾腎之火以生土須七八帖方能奏效雖酷暑亦以是治之數十年來皆如是是知有是病便用是藥不可因時改劑也康聖功孫痘症一案第六十二康聖功孫五六歲出痘一醫以熟軍首下二次蓋赤岸痘醫皆宗救偏瑣言首用大黃下者強半四朝延豫視色淡形扁不渴神安身微熱腹軟微脹虛症也恐用溫補不信令換請一醫兼視來醫雖云虛症所開之方首寫生地豫止之令再請繆平遠兼視平遠意與豫同以補中益氣湯加減始終以之並未涉一涼血之藥灌漿時猶忽作瀉時朱笠葊至加以木香鹿膠黃耆用至五錢始愈是知痘症始瀉後補者十中六七始終有瀉無補者十中二三始終有補無瀉者百中三四也豈可概以通套法治之乎王弘仁痘瀉一案第六十三族侄弘仁出痘余不知其初症若何至十二朝忽大瀉日夜百餘行所下皆黏滯之物如白痢狀頭頂大半飽膿余皆白殼人皆以為必死茲後竟未投藥而愈此因正氣充足臟腑不致受傷反能傳送毒邪而出是知十二朝之變瀉與七八朝之變瀉大不同矣豫痘症一案第六十四豫十五歲即得吐血夢遺症至十九歲始出痘蔣子和先生云此痘幸無毒若有毒服解毒藥必斃使無勞症可不藥而痊但腎水虧損不能制痘火若夢遺吐血一發則難措手矣遂以六味地黃湯加麥冬始終以之至灌漿時猶夢遺二次加人參五分二帖漿飽至於結痂止頭面硬疤余皆軟痂痂落帶白腿肉麻者數年至於手足軟皮撕起剔出乾血如臭鱉形竟未化而愈由此飲食鹹少形肉消瘦終身羸弱不振豫思此症服芩連犀羚則苦寒傷腎而死服升葛荊防則下元愈虛而死服保元湯則陽愈勝陰愈虧而死不服此藥則夢遺吐血必發終死噫微先生孰能至此大亡兒痘症一案第六十五痘書以面白嬌嫩者為皮薄屬虛紅黑者為皮厚屬實殊不知白而嬌嫩者有似於薄其間亦有體健者紅而黑者有似於厚其間亦有體弱者不可概論也豫大亡兒出痘體甚健皮白嬌嫩始而腹痛作瀉醫以為皮薄不敢大瀉聊用清涼之藥至六朝即補參耆才進麵漿忽停後面抓破血出醫方悟為實症然已無救矣此醫曾閲救偏瑣言而不能用何哉次亡兒痘症一案第六十六次亡兒出痘體甚弱犯氣虛毒勝醫始以熟軍下之豫曰此兒體弱當超期用補醫曰從未有未見起漿之勢而遽補者又以熟軍下之自是遂努瀉不止至七朝方用參五分見熱勢忽起又以寒藥與之至十一朝而斃死之時皮肉抓去止有脂水而無膿血其虛可知此醫曾讀痘疹正覺何得偏執救偏瑣言耶前醫不信救偏瑣言而誤補此醫執定救偏瑣言而誤攻是皆不能用書而為書所用之過也吳小兒天花不治一案第六十七夫感寒下症當用生大黃以其舌乾糞結津液乾枯更佐以芒硝軟堅惟恐下之不速若結之不堅者又當減去芒硝下症再緩者又當以生熟軍並用之若夫痘症下法舌不幹糞不大結下之立通不必速下且痘伏毒非一下所能盡又多毒産陽位若以生軍大瀉不止腸胃空虛若伏毒再出何能更下且陽位之毒終不能去正取酒蒸多次將巔頂之火盡從二便而出如伏毒再出更可二三下之蓋酒蒸則能破瘀宣動使毒火散而瘀血破誠妙藥也吳兒半周出痘初看時稀朗明潤笑容可掬似無痛苦內症但前害耳未痊至三朝右耳忽發頭面皆腫渾身痘俱沒下一醫下以生軍一錢五分瀉後痘出繼而膿出腫消然從此水聲漉漉大瀉不止至六朝左耳又發痘又沒下然已大瀉三晝夜不敢再下至七朝而斃當時若以熟軍緩緩二三下之則巔頂之火俱去何致左耳又發而斃乎蓋本草大黃條下云生用則遺高熱之病於此可徵余言不謬矣虎墩痘兒瘞而復蘇一案第六十八痘兒系虛症死者則氣血耗盡無再生之理若實症死者瘞土則火毒盡解猶有復生之機余居虎墩時有一痘兒死瘞道旁其所經宿數則豫忘之矣一行道者聞其啼聲開土取負而去此豫所親見者是知瘞於空野而復蘇蘇而復死者不知其幾矣凡痘兒實症死者可瘞之家中身上少加細末涼土多恐壓窒氣道但露口鼻上以薄板覆之板上再加涼土信宿不蘇方可舉瘞郊野此案雖無補於醫然而惻隱之心有所不忍倘能以此傳告得救一兒則勝造七級浮圖矣吳瘸子之子疳瀉目翳繆繼祖疳疾目翳合案第六十九虎墩下團吳瘸子之子七八歲久瀉面黃身瘦雙目生藍翳一醫謂疳火令合蘆薈丸需銀數星其人甚貧無資配藥就視於豫豫意當溫補脾胃升清降濁遂以補中益氣湯去當歸加白芍赤茯澤瀉木香四帖瀉止翳退若服蘆薈丸不但翳不能退則大命隨之而傾矣表重侄繆繼祖七歲時發蟲疾左目生藍翳腹不瀉但痛不思食形體如常豫只攻積去蟲以治翳本補劑寒劑皆不用以香砂平胃散加蕪荑雷丸使君肉五穀蟲檳榔等一帖而痛止去蛔數條即思食目翳漸消豫前云凡一病皆有虛實兩端於此可見矣仲恭玉三郎痘後目翳一案第七十仲恭玉三郎痘後目翳將百日方延豫視不肯服藥非數帖所能奏效余盡去難服之藥純用甘寒及味淡者如二冬生地銀花甘菊穀精木賊荊芥夜明砂甘草羚角當歸蒺藜蟬蛻丹皮芙蓉葉之類熬膏以蜜濃收之一取味甘肯服一取汁厚易於奏效待兒時時服之未二旬翳全消矣蕭友桐目翳一案第七十一星士蕭友桐已損一目一目又生新翳系風熱外障微紅不腫豫惟以驅風散翳之品發之又恐時值夏月其人年逾五十發散太過表裡俱虛所關非小奈貧不能服參以生耆生術佐之只使以酒芩一味即生地亦不用點以大辛熱之藥豫始允以十帖見效不意服至七帖已見微光十五帖翳全消矣賁大成幼子雀盲眼一案第七十二賁大成幼子五六歲夏月久雨垣頽被壓忽目夜盲不睹燈月且風痰有聲凡有損傷不論何處積血必流肝家今被壓而兼以風痰阻塞肺竅是肝與肺痰血互相壅滯也肝屬於陰開竅於目故至陰分不明豫用川芎赤芍歸尾桃仁紅花熟軍夜明砂穿山甲大貝橘紅前胡杏仁四帖而愈次亡兒黃水瘡一案第七十三次亡兒生數月面患黃水瘡脂流處即害遍治外科藥不痊豫思解毒散瘀者莫如大黃與紫花地丁以二物煎濃汁新筆蘸掃之旋干旋掃應手而愈家舅母胃痛並附陳相文治二胃痛合案第七十四雉皋陳相文言在盱眙縣行醫有賣棗子客人體甚健色事後多食麵餅冷羊肉滿腹脹痛甚劇衆醫以常例治之不效陳用巴豆丸八錢始愈又治一胃痛症已一月矣用黃連三錢而愈豫以為謬言家舅母年八十四今歲胃疼復發舌黃干不能語脈遲有力諸表兄弟以為年老不許用瞑眩之劑豫只得用香砂二陳炒梔枳朴熟軍一錢半人參八分毫不見效復用木香一錢炒梔三錢吳萸八分川連一錢半元胡半夏各二錢青皮枳實各一錢服後三瀉而痛止脈轉浮數鬱火伸矣舌猶干強不肯服藥頻飲西瓜水而愈然炒梔三錢不減黃連錢半之力方知陳言用黃連三錢不謬矣此既不謬而用巴豆丸八錢又豈全謬耶然未經目睹終難輕用也按巴豆丸我地之人服五分為止陳雲盱眙之人可服一錢半為止山東之人較強盱眙此係山東之最健者故能任此大劑也附湯萬春治繆姓間瘧一案第七十五繆姓患間瘧剛過三發湯萬春處以人參白虎湯合小柴胡湯石膏用一兩黃芩三錢知母貝母各二錢令露一宿五更時與服不意夜忽夢遺繆畏藥大寒不敢服湯云各行各道可服之無疑服後瘧果止而諸症皆安當時若懼而不服或改用溫補瘧必復至而劇虛而益虛火而益火變症百出纏綿不已矣是知乃有故無殞之理也豫服其膽壯而理透故附之附王廷絢治二痘症合案第七十六王廷絢乃老成痘醫也曾言治二痘症俱系五歲兒一舌黑口裂譫語狂亂點如胭脂水灑先醫下以巴豆丸王用犀連紫草各三錢石膏一斤余加群藥四帖後犀連紫草各一錢石膏半斤余加群藥亦四帖十二朝來漿後用人參收功一見點甚稀手足俱冷其點時現時沒吐瘀血一碗始終以附子理中湯而愈豫意此二症一生在曾服巴豆丸蓋痘舌黃即罕見其生況黑乎須知黑者乃巴豆丸以火濟火所致非本來之黑故可愈一生在吐瘀血一碗此兒原有蓄血故身弱既蓄血能與痘毒併發則中氣雖虛未甚況瘀血一去正氣立復好血漸生再兼痘稀毒微故愈也附嶽丈一笠上人治雉皋陳綿祚目疾一案第七十七雉皋陳綿祚目有舊疾復感風寒而發衆醫以為素有積火所用皆寒涼之藥毛竅愈閉鬱火愈甚頭目痛不可忍家嶽先吹以嗅鼻散痛猶不止此日屬甲又不可灸頭目遂令尋火酒藥二丸研碎和蔥白搗汁敷之其痛立止此古書所未載乃出心裁洵奇想也世人治目惟知用極寒之藥而孰知用極熱之藥之理哉繆姓痢疾一案第七十八世醫動以虛寒二字連説謂虛而即繼之以寒溫補不效辛熱隨之在他症此法或有不可用者惟在痢疾用導滯芍藥等湯七日不效即當溫補溫補不效即當繼以薑桂此古人言之諄諄實有至理不可移易而孰知有不盡然者繆姓季秋患痢甚劇五色皆有胃飽悶不食嘔痰身熱脈浮數醫先未用柴胡而遽投以導滯芍藥等湯重用生大黃不效所更之醫皆模稜之藥至一月後痢雖漸減終不霍然延豫視之其少陽之邪雖經屢下猶未深入腸胃身漸惡寒將轉瘧矣而脈滑數猶不大虛豫以補中益氣湯倍柴胡去當歸加白芍木香半夏赤茯苓澤瀉豬苓二帖瘧痢皆止但內熱復作仍思冷飲以前方去木香半夏減柴胡重用生白芍又二帖諸症皆愈蓋因少陽之邪未從表散鬱火至今猶在雖虛而仍兼以火故涼補則效而熱補則他症復起也若執以久痢當用薑桂寧不敗事乎
