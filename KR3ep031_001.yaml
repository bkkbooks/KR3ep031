body:
  text: 卷上論達原飲第一吳又可治瘟疫用達原飲發前人之未發誠妙論也然豫有辨焉彼云毒藏募原一日則害正氣一日故用檳榔厚朴草果速開募原使疫邪早潰全正實多然此為正氣盛者言也若虛弱之人再進此藥中氣愈餒何由鼓蕩疫邪而出非徒無益而反害之矣疫症理同痘症痘藏於腎種之先天故發遲疫藏於募原種之後天故發速痘症用升發清涼而出者固多然間變有始終用補中益氣湯及保元湯而愈者須知補正即所以發毒也古用人參敗毒散治疫未始不有高見但痘與疫皆系火毒瀉多於補耳若謂有瀉無補恐無是理也自瘟疫論與救偏瑣言一出則世之患疫與痘者不死於補而皆死於瀉不獨此二症為然凡病皆有虛實兩端正氣實者無虛症正氣虛者無實症實者驅邪以全其正虛者養正以驅其邪其義一也又有實多而虛少當瀉多而補少實少而虛多當瀉少而補多有當先補而後瀉者有當先瀉而後補者但要絲絲入扣不可妄施則得矣所以治病有始中未三法與補瀉兼施之理此理大合兵法有兵精糧足直攻其寇者此治病之初法即瀉法也有糧草不繼寓兵於農者此治病之中法即補瀉兼施之法也有國氣空虛寧受巾幗之辱而終不與之一戰者此治病之未法即補法也又知實症之最者雖終亦瀉虛症之最者雖初即補若概以達原飲施之能免虛虛之罪乎論瘟疫論禁用石膏黃連第二瘟疫論云石膏黃連寒而伐胃閉痼疫邪難潰且黃連守而不走不若大黃之走而不守雖然不可執也大黃固走而不守矣彼動用白芍又能寒而走乎況石膏可以發汗豈寒而守乎其有大渴飲冷六脈洪數不合承氣湯者非石膏而何其有下後不愈不合再下者非黃連而何但佐以氣藥則善矣又何禁而不用耶論感寒時疫伏脈第三元胃有舊疾或痰飲或飲食或氣或血之類復感寒或染疫雖渴而喜熱飲脈反伏而弱胸中必有痞滿噯氣疼嘔諸症用藥當從瀉心湯之例寒熱並施更兼枳桔青朴檳榔草果之類選而用之或佐九蒸大黃每見殊功若誤認虛寒投以溫補禍不旋踵矣論感寒疫症下利不同第四感寒太陽陽明合病下利用葛根湯解表太陽少陽合病下利用黃芩湯和解少陽陽明合病下利脈滑而數者有宿食也承氣湯下之謂太陽陽明合病少陽陽明合病皆兼陽明太陽少陽合病陽明居中更無所逃是知陽明水穀受兩經之寒邪擾亂必致下奔也至於瘟疫下利或疫邪自募原傳胃或胃中原有積滯因熱毒擾亂下奔皆屬內症舌白胎者小柴胡湯合達原飲加減清之黃潤胎者三消飲雙解之黃燥胎者承氣湯急下之始而自利終必大下以其疫邪傳胃與胃中原有積滯之症皆當大下也須知治下利則同而所治之理則不同論小柴胡湯為疫症要藥第五時醫治傷寒始終一小柴胡湯蓋太陽陽明二經之麻黃湯桂枝湯大小青龍湯葛根湯等方最難用用之下當適足敗事莫若守一小柴胡湯為最妥也邪在少陽者用之恰當即在太陽陽明者多服幾帖邪自外出然未至少陽而先服反能引邪入內惟在疫症雖不始終以之除三承氣湯症外皆可加減治之蓋傷寒自外入內首太陽次陽明又次少陽疫症自內達外首少陽次陽明又次太陽故以小柴胡湯為第一方未有少陽門開而陽明太陽之門終闔者如系汗愈之症始終一方加減可治若兼傳內則始同而終又異矣是知小柴胡湯為疫症要藥非傷寒要藥也論時疫感寒生死法第六時疫與感寒脈滑數重按有力者一定生症如脈虛弱神情鎮靜未至大虛猶可治也更有伏脈結脈本脈之辨不可誤也若脈虛弱或促數空虛或細數無神加以譫妄躁亂舌無厚胎此正虛邪盛必死症也論外感時疫下早之誤第七今之庸醫未熟讀仲景之書而粗看又可之書無論感寒時疫首以一汗汗出不愈繼而一下以為汗則表解下則里解病無逃遁矣殊不知其病情隱匿醫理深微有非汗下所能頓愈者若果爾則仲景之三百九十七法一百一十三方將安用乎外感不同時疫汗下不拘日數然下早變症甚於時疫以其從外而之內也時疫雖從內之外下早亦難治蓋人身之陽氣七日一轉自得病之日至第七日一陽之氣來復疫始送出輕則自汗而解重則定下而解其有不俟七日而愈者乃稟氣素足竟送疫外出不待一陽來夏也汗解者自汗而解下解者必有下症迫之不待七日始下也若待七日始下則危矣然此百中之一二其六日自愈之症者良醫用藥必使經絡疏通津液不枯正氣不損內結漸消至期何難愈乎其復者亦七日愈汗者仍汗下者仍下今之患疫者苦於迫促醫者又不明此理急於求功見汗不解別無他法驟然一下以冀頓愈正氣有虧行機忽蹶表熱陷入痞滿立至經絡阻滯疫邪難潰輕則牽延時日重則變為死症安望至期即愈乎瘟疫論雖云屢下然胸有定見絲絲入扣下則愈不下則不愈非若庸醫之懵然用下也雖然必先熟讀仲景之書再細玩又可之書更須閲歷深久不致膠柱鼓瑟方能從容中道論時疫每夾外感內傷第八時疫之中每夾內傷外感是一病而三病兼之不可不察也蓋疫症盛行於春夏而此時寒熱不均衣服時時更換易致外感但輕於冬月用藥又須斟酌耳此似是而非實兩症也再病疫之家服勞者早夜不眠飢寒交集憂怖焦思不但外感易而內傷更多復染於疫是三病而為一病也醫者當辨其孰重孰輕孰有孰無須要絲絲入扣不可概以疫病治之辛巳歲豫夫婦病疫虎墩其時雖疫氣大行然亦因母久病早夜服勞兼之逝後經營百端是三病皆有然必以內傷為重故所治之藥皆補內傷不涉寒門疫門一味此虛重邪輕故可以補正而邪自去也論三陽經用表藥法第九後人謂仲景太陽經用麻桂陽明經用葛根少陽經用柴胡若在太陽用葛根陽明用柴胡是為引賊入內此言誠是然為斷章取意而言尚未體會仲景全書得仲景活法也仲景云太陽病項背強几几反汗出惡風者桂枝加葛根湯主之又云太陽病項背強几几無汗惡風者葛根湯主之是太陽亦用葛根矣又云傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之又云傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之又云傷寒十三日胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡以解外後以柴胡加芒硝湯下之此三條仲景雖未貫太陽病三字然而後賢列之太陽篇中是太陽不但用葛根而且用柴胡矣又云陽明病脈遲汗出多而微惡寒者表未解也可發汗宜桂枝湯又云陽明病脈浮無汗而喘者發汗則愈宜麻黃湯是陽明亦用麻桂矣又云陽明病脅下硬滿不大便而嘔舌上白胎者可與小柴胡湯又云陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之是陽明病不但用麻桂而且用柴胡矣又小柴胡湯加減法若不渴外有微熱者去人參加桂枝溫覆取微汗愈又云傷寒五六日已發汗而復下之胸脅滿而微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之此二條仲景亦未貫少陽病三字然後賢列之少陽篇中是少陽亦用桂枝矣總而論之人身之營衛經絡一氣相通才感外邪即傳變不一當隨合併之有無多寡與寒熱之內外淺深用藥如不渴麻桂成方可用如少渴可加葛根舌白胎可加柴胡其白芍黃芩花粉石膏等斟酌加入不必拘拘於麻黃桂枝葛根柴胡等湯之不可化用也此專為外感發表而言若夾內症必兼治方效仲景逐條立法定方以嚴其律觀書者當通篇融化以得其神方為體會仲景全書得仲景活法也至於春秋感冒或溫疫初發太陽經麻桂既不可用可代以羌活若至初夏又當代以蘇葉盛夏又當代以薄荷或防風然熱時有反寒者寒時有反熱者又在乎人之通權達變也論傷寒時疫下症當以舌胎為第一義第十傷寒下症最當珍重若下早症變結胸固為可懼若下遲則津液乾枯更為死候也豫不得不為細論之仲景以汗出多不惡寒反惡熱脈大譫語煩躁發作有時心中懊憹而煩短氣而喘腹滿痛繞臍痛目中不了了自利清水色純青厥諸症斷為下症然汗出多不惡寒反惡熱脈大有白虎湯症譫語有少陽經症煩躁發作有時有陰躁虛煩之不一心中懊憹而煩有梔豉湯症短氣而喘有太陽經症胸腹滿有表症繞臍痛自利清水色純青厥有陰寒症目中不了了有奪精脫氣脫血諸症皆不足憑節葊又以脈沉斷為下症謂脈沉為歸里理甚通然此為脈實素無他症者言之可耳若脈弱之人或兼素有痞結之症邪才歸胃脈愈小弱重按無力全似陽症陰脈蓋因脈弱氣結再兼火氣堅縛愈伏不出故有此象昔人云陽明症多假脈人但知其言不解其理蓋陽明為氣血發源之所藏痞結之藪一有痞結則氣血凝滯故脈或伏或結甚至小弱如無人只知沉而有力為積殊不知沉而無力亦有有積者此豫素所經歷外感時疫參以內症俱緩下而愈內傷亦先瀉後補或先補後瀉與補瀉兼施若誤認脈虛遽然大補內傷猶可外感時疫禍不旋踵矣是知最強最弱之脈皆在陽明故有陽明病多假脈之嘆也此下症脈沉之不足憑也一端矣又豫治丁尚志之婦肺素不清兼之外邪傳肺而喘咳不止又兼傳胃而舌乾飲冷脈因咳而氣上當浮又因舌乾胃實當沉二者兼之全似白虎湯脈浮沉著中重按不實細揣腹中雖滿而軟然指彈膨響大便亦通豫以舌乾為急務以小承氣湯生熟軍各半加桔梗蔞仁三下而舌潤渴止但咳不止單以清肺而愈以此症觀之則又有白虎湯脈而當用承氣湯之症者詎不怪哉此下症脈沉之不足憑也又一端矣如此者不可勝記以豫斷之莫若以舌胎為第一義為有諸內必形諸外簡直易明不可欺也邪在大陽與陽明之經者舌無胎在少陽經則有白胎才歸陽明之腑則舌轉黃潤矣若兼胃中痞滿而猶帶寒熱往來者大柴胡湯若兼大渴飲冷者合白虎湯若無寒熱往來而胃口痞滿者小承氣湯若痞滿亦無而譫語者謂胃承氣湯若舌黃少干惡寒全無者大承氣湯兼痞滿譫語者大下之無痞滿譫語者小下之若直待下症俱全再徵之脈沉而始下則百無一生矣又有白砂胎者亦承氣湯症也必有實症可憑舌雖白而砂與津液不生之虛干舌異又有厚灰胎者乃素有痰滯亦承氣湯症也又有厚白胎者乃小柴胡湯加枳朴症也又有下症而終無結糞者但當辨其表症全無胃中必有痞結不快處或噯氣或先曾嘔逆或腹彈膨響舌兼黃潤者小承氣湯舌無胎者檳榔丸或滾痰丸及白散等選而用之此乃滯重火輕不必拘拘於仲景之下禁丸藥也又有胎雖黃薄而流轉如荷珠狀者與舌忽干忽潤而無胎者皆虛症也其時疫下症較傷寒略先一步然亦必以舌黃為據若下之太早變症亦為可懼又有舌雖黃燥而無汗必下之自汗隨至若以傷寒為例直至汗出多而始下則殆矣瘟疫症吳又可論之最詳此不過姑引一條以徵舌黃當下之要訣耳余不贅論感寒時疫有禁食不禁食之說第十一外感時疫有言得病即粥湯粒米不可食者有言飲食始終全不當禁者議論紛紛不定豫為細言之蓋人之胃氣強弱不同有天壤之殊不可執一其強者胃氣充運兼之素無積聚雖有外感內疫不能阻滯氣道食入易消易飢烏足為患外邪不能深入內疫亦自易出病易愈耳若不明此理妄禁飲食中氣一餒外邪反致深入內疫不能鼓蕩而出變為危候也虛弱之人胃氣原不充運或兼素有積聚一經風寒外束疫邪內發胃中早已痞滿不飢不食若再飲食強進則必中宮填塞變為承氣陷胸瀉心等湯及白散檳榔丸諸症若小下則不能開其結若大下恐中氣莫支補瀉兩難措手莫若聽其不飢不食使經絡易通以小柴胡湯加減和之俟一陽來復之期或可自愈也然感寒自外來未至深入猶可食粥以御其邪時疫從內發當察其果無痞滿與舌厚白胎而能易食易飢者方可以稀粥與之論感寒時疫有食復不食復之異第十二感寒時疫其愈有二有舌無胎而汗解者此內症本無愈後即可食稀粥若舌胎黃燥或汗後下愈或下後汗愈內火不能遽清雖米飲下咽立復必使頻飲松羅濃茶俟小便淡黃如象牙色方可漸進稀粥也論傷寒時疫過經不解第十三傷寒過經不解喻嘉言謂邪在身中日久勢必結聚三陽太陽為多少陽次之陽明又次之若在三陰生死反掌不若是之久持理固近矣孰知純表症者只在七日自仍若不愈者必有內證勾結表邪不散豫謂陽明而兼少陽太陽則有之若舍陽明則未也觀仲景過經不解諸條或與謂胃承氣湯者乃純陽明症也或先與小柴胡湯後與大柴胡湯及柴胡加芒硝湯者乃陽明而兼少陽也至於太陽治法仲景全無有一條內云先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證喻氏因承氣柴胡二湯不可與遂斷為太陽症豫意嘔痛必兼陽明豈單太陽乎是知太陽少陽之單症絶無也若屢表不解必細辨內症或滯或痰或氣或血或蟲表裡兼治自可立愈何致過經不解乎若疫症過經不解則毫無表症矣論感寒時疫當以利水為第二義第十四感寒以麻桂發表為第一義時疫以小柴胡湯和解為第一義瘟疫論又以達原為第一義然此劑剛猛當看元氣虛實胸膈痞滿有無用之豫意二症之第二義在於利水何則蓋熱邪壅滯經絡茶水難於升降易致停蓄而成水結胸之症必仿五苓之義表裡分消上下疏通常使經絡不閉庶幾易解耳然必細辨其果系水停而非痰食氣血之停或水停而兼以氣血痰食之停用藥須絲絲入扣方不有誤其利水之藥惟滑石木通性涼而利水最速且能發汗勝於二苓澤瀉論外感發汗與時疫自汗迥異第十五感寒發汗與時疫自汗其病情迥異用藥懸殊天壤夫外感之初表有熱而內無熱故服麻桂辛熱之品一驅而表邪盡出矣漸轉入里方用葛根柴胡白虎承氣等湯是知在表則汗愈在中則和解清涼愈在裡則下愈下症必先有汗若無汗必先汗而後下疫從內發熱毒在內而應於表故首禁麻桂當以小柴胡湯和之以少陽乃從內之外之第一層門也然用之有汗亦不能解以疫邪不能遽從募原達表若用之無汗乃疫邪或內症阻閉不可強發仍以小柴胡湯加以清涼疏通之品日日與之使疫火漸消陰氣漸復經絡疏通至七日一陽之氣來復輕者邪從募原盡達於表自汗而解不必再藥重者舌必黃燥如終無汗縱有汗亦不遍以三承氣湯斟酌下之使火毒去而津液生則舌必先潤自汗乃至此水到渠成之理若舌仍乾燥而汗出者頃刻亡陽之症是感寒下在汗之後疫症下在汗之前感寒發汗宜助陽疫症發汗宜養陰也然外感發汗宜微毛竅少通而邪自外出若大發其汗則津液乾枯反成危候疫解之汗陽氣被閉日久至來復之期疫邪暴潰內火與正氣並伸其汗必漸出如雨雖解後若少進熱湯則津津汗出必一七或二七後內火盡消胃氣大復方能自止若不明此理自汗時恐汗多亡陽而遽止之則從表所出之邪仍返於內輕則結聚少陽之位而發頤重則結聚胸胃之間無異結胸甚可懼也論感寒與時疫之嘔不同第十六感寒惟太陰一經屬吐其餘五經皆有嘔症有發表和解攻下雙解去痰飲消積滯散逆氣安蛔利水除膿溫補清涼之不一種種治法茲不細述惟舉少陽一經之乾嘔言之蓋少陽之嘔為邪在半表半裡之間表邪欲傳於內裡氣欲伸於外互相爭拒故此經必乾嘔也舌現白胎當以小柴胡湯伸其正氣驅邪外出而嘔自止矣舌黃潤者當用大柴胡湯或柴胡加芒硝湯再兼以上諸症者須兼治方效至於疫症之嘔乃疫邪內發阻塞於胃其將潰未潰之勢鬱而不舒之象亦現乾嘔之症舌亦白胎當以達原飲加柴胡破結以促其潰邪潰而嘔自止矣舌黃潤者又當加以熟軍或芒硝再兼以上諸症者亦須兼治方效一取上升一取下降相懸天壤矣舌乾黃者無嘔症以外邪內疫已經結實乃承氣湯症也論柯韻伯寒傷於表法當溫散寒傷於裡法當溫補之句第十七柯韻伯風寒辨惑論有云夫開口言傷寒動手即用寒涼克伐之劑曷不於傷寒二字顧名思義耶寒傷於表法當溫散寒傷於裡法當溫補此誠千古明言然特為好用寒涼克伐者矯弊耳夫寒傷於表法當溫散者乃寒感之初內未有熱即當用溫散之劑驅出寒邪立愈矣若邪已傳內鬱火已生痰飲被其煎熬胸將熱結則又當權其表裡寒熱之輕重胸胃痞結之有無而兼治之汗始出也不然則仲景只當用麻桂二方足矣又何須用青龍越婢陽旦柴胡黃芩等湯而解表乎若胸有熱結非枳朴蔞連以開結清熱則裡氣閉塞而表終不解此症瘟疫居多而感寒間有然方法自可通用至於寒傷於裡法當溫補當歸直中一門此惟喻氏分辨最詳可不復贅觀此豈非柯氏特為好用寒涼克伐者矯弊乎論傷寒發明第十八崇川程繩玉先生近著傷寒發明所遵柯韻伯十分之六喻嘉言十分之二方中行十分之一余則發以己意可謂集大成矣然愚意猶有未盡善者如所論柴胡桂枝龍骨牡蠣湯一條闢喻解最當其餘論太陽經傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊之緊字少陽經陽微結之結字少陰病心下溫溫欲吐厥陰經臟厥蛔厥諸條並差後勞復凡病邪既至不可輒認為實須防正氣因攻而虛病邪去不可輒認為虛須防餘邪因補而復集之語皆另具手眼超越千古矣且能體認某句當在某條之下斷章分注絲毫不爽非此中面壁多年者不能也獨怪將柯氏之書斷章而下復合未免反掩柯氏之心法程言柯氏傷寒論翼為上智者言恐時人不明斷章分解於各條下使人逐條即明亦善法也孰知柯氏之意謂古今所注者惟逐條注解未有通論三百九十七法一百一十三方者若逐條看注未免顧此失彼泥於一法一方有膠柱鼓瑟之嘆故講一法則舉衆法比類而推講之論一方亦舉衆方比類而推論之遂覺仲景通身手眼俱在目前令人渾化而得之也程氏斷章而不復合仍與衆識無異矣豫意必將柯氏全書刊附於後使讀者先逐條以明其說次渾化以神其用方稱全書方得柯氏心法也豫曾會大世兄孟宣言及此意孟宣云家父在日亦曾言及因艱於刻資故爾未曾刊附論賁豚症有虛實不同第十九內經無賁豚症只有伏梁症二伏梁即賁豚也難經始分五積之名以心積名曰伏梁腎積名曰賁豚謂腎為水臟豚為水畜臍下乃腎位故名賁豚又其氣跳動狀如豚之上賁也是二症一系內癰一系風根皆素有之實症經云不可急攻東垣制五積丸攻補寒熱兼施治之甚當又仲景書云燒針令其汗針處被寒核起而赤者必發賁豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂此係即出之虛症仲景借前賁豚之名以名之也蓋其人腎氣本虛不當大發其汗而燒針令其汗出則強發可知胃陽一虛不能蔽護腎陽故腎陽發動上奔若治之少緩頃刻亡陽而死矣故以桂枝湯三倍其桂招之內入白芍斂之下行以安其腎甘草助胃陽而蔽腎陽純為治里之劑而非復解表之桂枝湯矣按仲景所用雖皆云桂枝然其中實有當用肉桂者不可不察此方是也此症最少初時當推麻黃附子細辛湯義治之方不有誤前症最多前症而兼感寒者亦復不少小腹雖然跳動乃素有積氣鬱而不伸所致終不能越關而上當以感寒之藥兼降氣疏通之品治之醫人若少經歷而謂仲景方法原為治傷寒而設不可移易重用肉桂豈不益其內焰津液乾枯而死乎仲景遺其多而反言其少者為實症易治虛症難防恐蹈虛虛之弊則有頃刻亡陽駟馬難追之患也論薄菏第二十疫症本系火毒非感寒可比故太陽經禁用麻桂改用羌活然豫猶嫌燥烈莫若蘇薄荷為最蓋薄荷辛能發表香能驅疫涼能解火味最尖利專能開竅豈不一物四擅其長乎疫症本無外邪且在春夏最易得汗不必藉羌活之燥烈也然必以柴胡為君以薄荷為臣口渴再加葛根而汗未有不出者若數帖而汗不出必有他症閉之兼理他症其汗自出論滑石貫衆第二十一前云薄荷發汗乃見太陽表症如汗出而表不解兼口渴溺澀此七日自汗症也溫疫論用柴胡清燥湯治之蓋疫症最喜涼而疏通之品滑石最為相宜每劑加入洵取自汗之妙藥也貫衆苦毒微寒能破癥結發斑疹解腹痛闢瘟疫疫症胃口痞滿結痛者用之最當何吳又可置而勿論乎論熟大黃第二十二溫疫論喜用生大黃未曾言熟大黃之妙蓋舌胎黃燥者當用生大黃矣若雖黃而潤大便不結生軍未可多用少用又不見效當生熟軍並用之如曾經發汗後舌未轉黃胸膈痞滿而痛者此原有積滯當以柴胡清燥湯加枳朴熟軍微利之此即大柴胡湯之意若待舌黃燥方以生軍下之是養虎貽患矣夫寒之最者莫如黃連用之火不能下即用熟軍一錢次日必小便如血蓋大黃乃推陳致新之品驅邪直下加以酒蒸多次能將巔頂之火驅之二便而出誠妙藥也即雜症積滯痰飲火眼火痘實痢實瘧或單用或佐以他藥每見殊功吾聞維揚之風棄而不用縱風土卑柔豈無十中一二強健者須知大黃所愈之症決非他藥可代若當用不用或反執補正而邪自去之語是齊元為周師所圍尚講老子安得不亡乎論夏月小兒內傷外感第二十三夏月小兒腹脹身暴熱或有汗或無汗或時有汗或時無汗此症固內傷飲食然外兼風寒暑濕者強半焉蓋此時小兒或裸體乘涼或就風熟睡或暴日嘻戲或濕地久坐故此時最多內傷外感之症即瘧痢之源也幼科不明此理以為身熱單系內滯所致止以腹脹為憑動用下藥殊不知內傷之食一去而外感之邪陷入重則變為結胸不治輕則變為痞滿醫見痞滿更下之小兒元氣未全遂變慢驚不治矣又輕者邪陷半表而為瘧或深入腸胃而為痢此皆專門幼科之罪也良醫於此必細辨外感之有無方為善治故喻嘉言以小柴胡湯治痢亦此義也論內經無痰瘧滯瘧第二十四內經論瘧皆本風寒暑濕並未言及屬痰屬滯者然後人有無痰不成瘧無滯不成瘧之語以痰以滯治之甚效豈古人反不及今人耶蓋古人片言居要只言病根而後人因此識彼闡發其變二者不可偏廢也瘧由風寒暑濕漸入而不覺遂藏少陽數日後發為瘧疾若如感寒之驟入則必一病不起尚待數日始發而猶在半表半裡半病半愈之間故猶然飲食葷腥不禁不知邪既中人經絡早已凝滯其飲食葷腥不能變化精微反能助桀為虐而變為痰滯也其外邪一與痰滯相搏勾連不散日久結為瘧母難愈故後人治痰與滯每每見效者以此詎非內經言風寒暑濕者為致瘧之本而後人治痰與滯者闡其變乎論內經脾病而四支不用第二十五脾病而四支不用有虛有實內經專主於虛謂脾主四支今脾氣虛弱不能為胃行其津液以灌溉乎四支故四支不為用也然體肥善飲素多痰火者一旦發動經絡壅塞四支疼痛亦不為用此亦脾家之病較前症更多一宜補正一宜滌蕩相懸天壤細參內症色脈自不能掩矣論內經論新産及大病後不可瀉與朱丹溪言産後當以大補氣血為本雖有雜症以末治之第二十六內經有五奪不可瀉以新産及大病後居其末後朱丹溪又云産後當以大補氣血為本雖有雜症以末治之以此聖賢之語觀之似新産與大病後無實症矣抑知産後之實症不少於虛症大病後之實症尤多於虛乎夫聖賢之意為此二症關係甚大設用溫補不當猶可改救若蹈虛虛之弊則立見殺人故專以虛立論也蓋産後之虛實當以生産之難易惡露之多寡斷之産難下血多者雖壯實之人多屬虛症産易下血少者如瓜熟落蒂雖羸弱之人不至大虛又有胎前有病者多屬實屬火若果大虛何能養胎胎氣壅窒氣道飲食鬱滯易為痰火是知實火之症一經産後有變為虛寒者有變為半虛半實者有仍系實火之症而終不變者未可因産後而盡以溫補治之也況生産之家或頻進産婦糯粥以安其胎或多食雞子以暖其腸或時飲椒酒紅糖以溫其中或常燒熱磚以尉其腹或過飲人參圓湯以補其虛或早食肉羹以開其味是皆與實火之症相助為虐矣醫人不明此理而膠柱鼓瑟惟執內經丹溪之語而強進參耆朮草歸芎溫補之品見熱愈熾又以為下寒上熱繼以附桂薑吳等則中宮如火加油變症百出至死不敢用寒涼消導之劑悲夫其瘀血不清亦不出虛實及半虛半實三種治法至於大病後若未入里而汗解者其症本輕可以不補若下解之症內火不能遽清米飲下咽立復尚可溫補乎須仍進苦寒導赤之劑但減硝黃繼以甘寒養陰直待小便清白痰清咳止一七後方可漸進溫補每見大病後痰火不清咳嗽不止醫人不敢再進苦寒而惟以甘寒潤肺日久不愈變為勞瘵而死此豫目擊心傷者也是愈後即進溫補之症百中一二內經之語尤不可泥此皆豫素所經歷故特表而出之但中病即止不可過劑耳論內經五奪不可瀉第二十七內經有五奪不可瀉謂形肉已奪是一奪也大奪血之後是二奪也大汗出之後是三奪也大泄之後是四奪也新産及大病之後是五奪也此皆不可瀉然聖人特言其大關耳其中實有不盡然者其新産及大病之後猶屬實症者豫前已論之矣大汗出之後當於豫感寒之汗與時疫之汗不同論中想見一斑俱不復贅茲特取其餘者論之如大奪血之後果系腎水不能制相火與所出皆鮮血者即當斟酌於補陰補陽之兩途若系瘀血必是正氣充足始能發動何大虛之有若有未盡仍當下之其鮮血雖屬當補若系痘疹感寒時疫之出血者又豈可遽補乎大泄之後若因重用硝黃而行之不止者可補若下之早數日後復聚於胃與未經下過而水瀉不止或小下而稀糞傍流細審內有實症者皆仍當下之也惟有久病形肉已奪一症是為真虛死不治為脾氣久已大傷不能復振邪亦固結不能即去不但瀉之不能任即補之亦不能受也若補瀉兼施終屬模稜而難挽故斷之曰此真虛症也死不治論石室祕録第二十八夫石室祕録一書乃從醫貫中化出觀其專於補腎補脾舒肝即醫貫之好用地黃湯補中益氣湯枳朮丸逍遙散之意也彼則補脾腎而不雜此又好脾腎兼補者也雖然此乃讀書多而臨症少所謂文字之醫是也惟恐世人不信托以神道設教吾懼其十中必殺人二三也何則病之虛者雖十中七八而實者豈無二三彼只有補無瀉虛者自可取效實者即可立斃豈非十中殺人二三者乎夫産後屬虛誰不知之至復感外邪則火多於寒胎前諸症亦然彼皆用附桂參術類中之症陰虛多於陽虛彼動用三生飲感寒人參難於輕投彼則恣用無忌舌胎黃黑非下不退甚有屢下之者彼惟以甘寒養陰痘症實火多於虛寒彼多用溫補何皆異於豫之所驗乎醫貴切中病情最忌迂遠牽扯凡病畢竟直取者多隔治者少彼皆用隔治而棄直取是以伐衛致楚為奇策而仗義執言為無謀也何舍近而求遠尚奇而棄正哉豫業醫之初亦執補正則邪去之理與隔治玄妙之法每多不應後改為直治病本但使無虛虛實實之誤標本緩急之差則效如桴鼓矣即作文之直接了當法也夫醫人治病須斟酌再四使萬無一錯十中而殺二三可乎是書論理甚微辨症辨脈則甚疏是又不及醫貫矣且醫貫若不經呂晚村先生批評則亦不可用而況不及醫貫者可善用乎至於用藥則大膽無忌蓋治病不難於用藥而難於辨症辨脈脈症既明用藥不遠矣若脈症不明罔識所從雖有妙理安能為用用藥少差立見殺人況大膽無忌乎總之治久病及大虛之症則可治新病及實多虛少者則不可治直中陰寒則可治傳經外感則不可治內傷勞倦則可治內傷飲食則不可種種治法不過一補而已何醫道之易易哉可知是書終為紙上談兵觀之者明其理而緩其用可也論沈虛明費建中治痘迥異第二十九沈虛明治痘好用升麻有用至三錢者虛症固用實症亦用之謂毒為本火為標升則痘毒外出而火自息也孰知虛症多用必重虛其表實症用之是以火濟火矣費建中好用大黃有首尾不禁者謂痘系火毒今又行之火運火毒未有不上升者不上升者皆毒火壅之也故下奪其壅則痘必上升孰知痘雖火毒必賴元氣鼓蕩若屢下而元氣下陷何能送毒外出並噓血成漿哉二理須渾化胸中方為治痘良醫論費建中頻頻欲解仍艱澀之句第三十瀉痢後重努責有虛有實書載紛紛茲不復贅以此推之是知痘瀉後重努責亦有虛實也費建中雲熱毒沖腸便自頻喜腸傳送毒難侵頻頻欲解仍艱澀誤認脾虛終內攻今醫凡讀費氏書者見痘兒後重努責不止悉認為火仍用涼瀉豫不得不為一辨之蓋兒發熱時即瀉者火也若瀉久不止與痘初未瀉醫用大黃行之不止者皆當與久痢不止元氣下墜後重努責者同一治也蓋火瀉者糞必焦黃黏滯惡臭內必煩躁攪亂痘必深紅紫滯根窠壅硬舌或黃甚至乾燥大渴飲冷此其辨也虛瀉者糞必青稀不惡臭痘色淡而根窠軟氣勢餒弱舌縱干而無胎為瀉久亡陰故也喜熱飲縱飲不多此其辨也若以頻頻欲解仍艱澀悉認為火則虛墜努責者百無一生矣其有痘初未瀉至灌漿或結痂時而忽瀉者仍系火毒不可溫補此費氏言之最詳豫不復贅論治病當以脾胃為先第三十一先飲食先入於胃俟脾胃運化其精微上輸於肺肺氣傳布各所當入之臟濁氣下入大小腸是脾胃為分金爐也若脾胃有病或虛或實一切飲食藥餌皆不運化安望精微輸肺而布各臟耶是知治病當以脾胃為先若脾胃他臟兼而有病舍脾胃而治他臟無益也又一切虛症不問在氣在血在何臟腑而只專補脾胃脾胃一強則飲食自倍精血日旺陽生而陰亦長矣試看精氣二字皆從於米噫微矣哉是知脾胃實諸病皆實脾胃虛諸病皆虛此醫家之大關也論治脾胃之法第三十二補脾胃之法可一言而盡至於治脾胃之法則非一言可盡者有先瀉而後補者有先補而後瀉者有補瀉兼施者有屢補屢下者有消導攻下之不一者有單瀉不補者有單補不瀉者有補胃陽者有補脾陰者有陰陽兼補者有用苦寒者有用辛熱者有寒熱並用者有升舉者有導下者有湧吐者有自大便而出者有自小便而出者有經年纍月而始愈者有一朝一夕而頓除者當博覽諸書自然得之矣論積聚與感寒時疫下法不同第三十三夫感寒時疫皆毒火驟然歸胃故用硝黃下之若火根不清少進飲食復變為火故不厭其頻下火清之後精氣暴復不日如初矣為其元氣素足被外邪驟困未久易致振發故也然而再下之劑必小且緩矣至於積聚之症乃元氣素傷其病與正氣混為一家譬如小人已竊其權若欲驟去必反遭其害且鬱積之火無感寒時疫之熾故有補瀉寒熱夾雜之治法漸漸消磨久積自去若急欲求功以硝黃屢下之則中氣愈虧不能復振聚而不運積聚愈堅變為中滿而死矣論力作之人與婦女胃中每多積聚症第三十四脾胃主運化喜疏通而惡鬱結故作樂侑食有自來也蓋力作之人每食必飽乘飽即用力用力則氣閉氣閉則不能運化故飲食停滯且氣與食停則血亦為之阻滯矣久化為蟲為痰飲是知此病結氣死血停痰積飲宿滯蟲皆有也故發則有胃痛噯氣吐蛔吞酸嘔痰與死血氣走注攻痛諸症並婦女多郁鬱則氣結故亦患此症且此兩種人多不知飢飽不飢見食或美膳必強食又好飲冷冷則冰伏至於疾發不思食又以為虛痰飲鬱火作𩞄又以為餓為血少強食妄補積聚有加無已醫人遇此兩種人須知多有此症其治脾胃之法前已論之矣論羸弱不能生子當補其脾第三十五五臟有病皆能殺人脾胃又其最者也故古人有補脾不如補腎補腎不如補脾之語但當腎病最急之時而反補脾脾病最急之時而反補腎則迂矣若於久病羸弱或始因腎虛波及脾虛而不能生子者吾意當以補脾為要也何則蓋精生於脾藏於腎腎藥每多妨脾以致飲食愈減精何由生且此時無失血之症芤數之脈不必滋陰但當用參耆朮草專補脾胃歸芍脾肝兼補鹿茸河車大補氣血菟絲山藥蓮肉芡實脾腎兼補且補脾胃者亦補肺補肝腎者亦補心佐砂仁以行脾腎之氣若少有虛火加以麥冬沙參凡酸澀鹹苦寒涼泥滯有妨於脾胃者一切屏去使飲食倍增氣血日旺精自滿足而能生子矣即血暴出不止亦當以獨參湯先固其氣以統其血其有久虛遺精者脾肺氣旺自能提攝古有用補中益氣湯者即此義也何必拘拘於補腎哉若脾胃素強食量頗佳而不生子者不在此論論治病當以人之元氣盛衰為本病為標第三十六人之生死全賴乎氣氣聚則生氣壯則康氣衰則弱氣散則死醫者可不審人之元氣盛衰以為治哉夫元氣之盡不外乎陰陽兩端蓋陰陽互根不可偏勝少偏則病偏甚則死矣如陽虛之甚者先回其陽繼而漸加補陰之藥是無陰則陽無以化也陰虛之甚者先補其陰繼而漸加補陽之藥是無陽則陰無以生也務使陰陽和平水升火降歸於中庸之道而已不可少有偏見也有元氣之盛者雖犯五奪之後而猶夾實症有元氣之弱者雖犯外感痢瘧痘瘍之初而便夾虛症又有平日最壯而竟得虛症者有平日最弱而竟得實症者此又不可不察也以上所言之症乃百中一二然不細心體察殺人正恐不少也論用藥效否當責之元氣強弱第三十七夫藥者所以治病也其所以使藥之治病者元氣也故元氣之壯者得病皆繫有余少服驅邪消伐清涼之劑元氣易於運行其效立見弱者雖得外感痢瘧瘡瘍傷食之症皆當以補益為本兼以治標之藥使元氣得以運行藥力以治其病也若捨本而竟治其標非徒無益必元氣愈傷立見危殆矣譬如刃者所以殺賊也其所以使刃之殺賊者人力也若力之強者雖操輕刃亦能殺賊力之弱者雖操重刃安能得用實足倒戈自害也知此理者其用藥思過半矣論脈數極多死症第三十八脈數寸中帶促至七八至者不但雜症為死病即傷寒溫疫最喜數脈者豫每驗之皆不可治其症必譫狂躁亂舌無黃胎或白胎或干而無胎渴飲不多或喜熱飲或不飲或大便不實或小便清白或淡黃而清皆正氣不足邪氣有餘之象醫人遇此縱治之亦當以生脈地黃湯為當也論脈多右大於左第三十九東垣云左脈大系外感右脈大系內傷此為初感外邪而言若鬱火已生則右大於左矣每見初感外邪多不服藥必待內熱口渴方延醫診視醫者不明此理妄以右大於左為內傷投劑多致差謬至於疫症本系內邪外潰首即右大於左痢疾系腸胃積滯亦右大於左直至久瀉不止變為肝木克脾土方左大於右久病專以脾胃為主平人亦以胃氣為本皆右大於左惟外感之瘧與暴怒系肝膽病並相火上炎腎虛亡陽乃左大於右耳古云一公子有恙自帳中出手診視醫入誤認纖手為女而云經水不調至今傳為話柄豫意此亦紙上談兵者所言若執男脈左大於右女脈右大於左則恐將天下大半男脈皆錯認為女矣豫經歷三十餘年病脈右大於左者十中八九也論脈極大多死症第四十脈大固為有餘太大反為不及不但失血産後痢疾脾虛久病忌之即感寒時疫最喜大脈者每多不救以其正虛邪勝脈已離根殘燈復明之象也童若愚感寒王禹訓妻時疫俱犯極大之脈重按鼓指著骨方無後變小弱皆未能救實假脈也縱治之亦當以生脈地黃湯為妥論久病而添實脈實症者多不治第四十一久病飲食減少形肉消瘦氣當虛餒脈當沉小遲弱理之常也此為脈證相符雖死猶延時日若忽證添氣粗痰喘胸膈疼脹口渴少飲便黃而清惡寒發熱而脈暴大數急此理之所無乃真氣發越頃刻亡陽之症法在不治縱治之亦當以八味六味地黃湯或獨參湯生脈散參附湯黑鉛丹養氣丹鹿茸丸之類審其陰虛陽虛而與之也若謬認虛中有實先瀉後補禍不旋踵矣論孕婦忌半夏之謬第四十二孕婦用藥每見忌半夏凡痰嘔之症皆不敢用殊不知孕婦脾虛有火易於生痰六君子湯加竹茹乃妙藥也今醫惟用四物保胎之藥膈愈泥脾愈虛胎墮必矣曾見一醫以娠誤認為痞凡破血攻伐之藥靡不畢投其胎終未墮卒産一男是知用半夏所墮之胎雖不用半夏而亦墮縱生兒亦未必永年況古方胎症不忌半夏豈古人反不及今人耶黃帝問曰婦人重身毒之奈何岐伯曰有故無殞故無殞也帝曰何謂也岐伯曰大積大聚其可犯也衰其大半乃止過者死是知有病則病受之雖遇外感溫疫痘疹痢瘧積聚之類當用則用但衰其大半乃止若舍此而反用保胎之藥是助桀為虐矣如果系陰虛血少當用四物湯者其胸膈必無痞滿痰嘔之症一有痞滿痰嘔雖系陰虛血少四物湯亦不可服也須知用攻得當即所以保胎用補不當即所以逐胎但要明保胎之理而不可執保胎之方也論直中陰症用藥法第四十三直中陰寒之症仲景用附子湯內用白芍茯苓懼陰竭陽無所附取其生津液且製附子之烈豫意此症血必凝結與其用芍藥之酸寒茯苓緩降莫若用牛膝之寒而散血且速入肝腎又兼製附子之烈豈不一物三擅其長乎凡産後血痛用附桂薑吳皆當加入牛膝乳沒豫每加入此等症內甚效論腹痛吞酸屬肝之偏第四十四腹痛之病世醫皆謂肝木侮上又石室祕録傅會其說云諸痛皆屬於肝動則重用白芍豫每見其鮮效特為辨之蓋肝有肝病脾有脾病有當肝脾同治者有當肝脾分治者未可概論也夫用白芍之症乃脾土虛不能乘載肝木則肝木搖動而脾土愈虛腹痛泄瀉所由來也且本中有火故用白芍酸寒之藥肝脾兼入平肝瀉火安脾一藥而三善俱備再以甘草補脾緩中則痛瀉自愈矣或加柴胡歸術而為逍遙散或加飴糖桂枝而為建中湯皆其推廣之義也若脾胃有積聚之症受寒多食而痛發者法當溫散中宮有鬱火者寒熱並用導火下行若反用酸寒之藥則氣愈閉滯愈凝火愈郁矣且肝氣益抑生生之氣不升積聚何由散乎其有因怒而脅痛者乃肝氣發動當以白芍合川芍升斂並用以調其肝不當單用白芍以抑其肝也此純肝家之病與脾無與其痢疾而用芍藥湯者乃取其去脾火且兼木香檳榔枳殼之散三黃之寒斂少散多寒多熱少最得制方開閣之理故效若單用白芍一味以治初起之實痢必不應矣按白芍同補藥則補同瀉藥則瀉但不可同補藥而誤施於脾家之實痛耳其吞酸之症乃脾胃不能輸泄畜聚變為酸餿法當調理脾胃而書反云酸屬於肝何其舍近而求遠哉若謂肝主生生之氣鬱而不升則脾胃之氣不振而有畜聚酸餿之症者亦當以川芎舒肝不當以白芍抑肝也是知治病者當究其源而窮其理不可以耳為目矜奇炫詭也論治痘當歸脾胃第四十五古今方書論痘毒皆藏於腎惟沈虛明謂五臟惟土能藏物當藏於脾豫意土之藏物一歲即發豈待歲久始發耶蓋痘毒如石火然取石置之水中雖百年而火不少減若激之則隨發矣是知痘毒必藏腎水須俟歲氣激動乃發沈子之言非也然所治之理則當歸於脾胃蓋脾胃為五臟之總關痘毒之發從腎經傳之脾胃始出觀古人首用升葛意可見矣又為五臟強弱之本胃氣強則易出胃氣餒則難出胃火盛則為火毒胃虛寒則為寒毒又為氣血生髮之源肺雖灑陳六腑灌溉諸臟實由胃氣上騰所致若胃有積滯痰蟲疼脹之病則中氣痞結何能上騰輸肺宣布痘毒而出並交會氣血哉小兒最多此病即閉痘之源也若舍此而徒補氣血與清涼升發終無益也後惟費建中好用青皮謂痘毒深伏肝腎者以此發之蓋青皮肝脾兼入最能去脾胃痰滯豫謂當改為脾胃有痰滯而痘不出者以此發之為是由是推之則二陳枳朴蕪荑使君之類隨症選用加以酒蒸大黃斟酌下之則胃結一開中氣發越然後補瀉升發無不立效矣論小兒驚搐多屬痰火附小兒久虛新停積滯不可強進補劑第四十六小兒驚搐多屬痰火其痰火之由不止一端蓋小兒元氣未充腠理不密加以純陽而欲外竄則腠理愈疏最易傷風又睡大人懷中被覆不密亦易傷風又乳易變為痰為有水乳相合之理又易傷食恐小兒啼哭可食者咸與之以止其哭又恐過飢凡甘脆之物靡不頻勸食之蓋食停則變為痰傷風所致乃肺家之痰乳與食滯所變乃脾胃之痰書云脾為生痰之本肺為貯痰之標況二經兼有則痰之多可見且小兒不會吐痰即肺痰有時而出則下咽於胃胃痰有時而出則上浸於肺互相牽引而不能去是痰有增無減既有痰滯久郁之火加以傷風之火濟以純陽之火痰隨火升詎不方寸迷亂變為驚搐之症乎醫人惟執以驚嚇起見用龍齒平肝麝香開竅硃砂寧心殊不知所迷亂者乃痰火壅逼心包絡之外痰火一清立愈若麝香與硃砂同用反引痰深入心竅兼以龍齒之澀痰何得出反成真痰迷心竅之症矣縱有驚嚇使無痰火自可隨愈何能變為斯症醫者當審其痰火在肺在胃或二經兼有若有表邪當以清痰利氣加以前胡薄荷或寒熱往來則加柴胡以治之若表邪已清或本無表症則當專清肺胃之痰火是麝香龍齒硃砂所治乃已成痰迷心竅非驟然驚搐之症也至日久不愈形瘦氣餒變為慢驚蓋小兒氣血未充最易變虛又當溫補脾胃兼以理氣化痰消滯治之矣又有小兒久病當用溫補又忽新停積滯家人畏責不敢言須細心審察不可因其形瘦氣餒遽投大補補之不效又以為虛重補輕強進不已立見危殆然此症多屬不治為其補瀉兩難縱治之亦當辨其積滯之寒熱多寡與人之虛弱輕重斟酌至當而治之也論醫道執一之弊第四十七醫者義也義者宜也宜者權也道至乎權尚有所執乎醫道如水隨方就圓大無不通小無不入無有定形無有定見方為醫道盡善者若或執於補或執於瀉更有補瀉兩不敢而惟執平和媚世之劑此儒者之鄉願可恥之甚者也或執於法或執於方或執於運氣天時或執於四方風土或執於老少強弱或執於膏梁藜藿或執多乎內傷或執精乎外感或執於補腎或執於補脾或執於初中末三法或執於五奪不可瀉是皆不明乎道之權者也然豫所言似易而實難不熟明乎經之理焉達乎道之權用經不當猶有可救用權不當則殺人於俄頃矣故必須讀書多經歷久戰兢履薄澄心玩索而始得其宜也若夫粗浮自是或專倚世法動人或單恃家傳得譽何怪乎終身由之而不知道者之衆也論立方當先立案第四十八醫者立方當先立案案即作文之題也案立某脈兼某脈某症兼某症平素強弱某臟素病某日得病曾服某方几帖年紀若干一症一脈猶單題數症數脈猶搭題看題中當重某字某句某節或單重或並重或少帶字字射題自中肯綮矣若不先立醫案則標準不的勢必想入成方方雖可觀何能見效為其吃緊處不得也何異作文者忘卻題眼剿聾陳文文雖可觀與題何涉乎論用藥戒濫竽術第四十九經云毒藥攻邪五穀為養是知攻邪必以毒藥調養必以五穀也臟氣之偏者為病藥氣之偏者為毒病亦毒也以偏救偏以毒治毒但使歸於中正而已故書云若藥不瞑眩厥疾不瘳但有似是實非不可顛倒誤施故經云毋實實毋虛虛又中病即止不可過劑故經云大毒治病十去其六中毒治病十去其七小毒治病十去其九是也吾觀今之醫人見解不透恐瞑眩之劑用之不當立刻取咎姑取中平藥數十種俗號為果子藥加以世法濫竽於衆醫之中病之淺而將退者適湊其效不知此病不服藥亦痊若病之深者適足養虎貽患也此醫馳名甚衆謂其穩妥而樂服也見用瞑眩之劑反指為霸譬如阿諛逢迎碌碌無奇者舉世悅之而剛正直諒者反畏而遠之群起而笑之也可勝嘆哉雖然其賢於寡聞淺識粗心浮氣誤用剛猛之劑而殺人於俄頃者又不無優劣於其間矣論舍脈從症舍症從脈第五十脈者症之准也症者脈之合也有是症便有是脈又何可舍乎夫所謂舍者乃舍其末而從其本舍其僞而究其真耳如人之本脈原弱再兼之積聚痰飲結氣死血疼蟲之類其脈愈弱或結或遲或伏甚則重按全無渾似臟腑皆虛者是為氣血阻滯而然實假脈也其有娠婦而脈愈弱者亦此理也皆當先瀉後補或補瀉兼施若細審諸症皆虛而脈忽數大倍常甚至重按有力全似白虎湯症之脈者此乃脾腎之真氣發越殘燈復明之象也當與症實脈虛之理反得之若誤用瀉藥立斃矣此皆舍脈從症之治也如五奪之症脈當微弱與症相應不知健壯者雖奪而猶未虛或本邪未清或復染他疾其脈數大有力此非亡陽之脈仍當以實症實脈治之也又有健壯者而忽暗中大虧雖形體未減而真元頓傷脈忽小弱或豁大空虛若審得其情雖兼他症亦當以補益為先若為形體所誘誤投瀉劑立斃矣此皆舍症從脈之治也凡此不勝枚舉是知脈症少有不符其中必有大故須細心面壁而得之可也論先瀉後補先補後瀉與補多瀉少瀉少補多補瀉各半以及屢補屢下之法第五十一病有先瀉後補先補後瀉與補多瀉少瀉少補多補瀉各半以及屢補屢下之法者雖皆虛實夾雜之症然治法實有一定之理若差之毫釐亦失之千里矣若其人素有舊疾羸弱者又忽新得實症法當先瀉後補何也蓋羸弱者久虛之症氣血已定雖不復振亦不復虛若果虛無底止又安能至今存乎是知驟補無益於久虛徒助新邪為虐耳若其人驟然大虛未幾新染實症法當先補後瀉何也蓋初虛之際氣血未定猶可因補而復振亦可因瀉而盡傾若遽用瀉劑則幾微未定之元氣將見一鏟而盡又安能冀其鼓蕩新邪而出耶此即五奪不可瀉與補正則邪自去之理也其有補多瀉少瀉少補多以及補瀉各半屢補屢下之法者皆在此二法中臨症自可躍然而得不必復贅論文字之醫與經歷之醫不同第五十二文字之醫用藥多補經歷之醫用藥多瀉文字之醫嚴於紀律經歷之醫精乎心法文字之醫見功遲經歷之醫見功速文字之醫精乎論理經歷之醫精乎識症文字之醫過於迂經歷之醫過於霸然皆功罪各半焉若二醫兼之再能通乎權宜靈其機變則萬舉萬當矣論忙醫之誤第五十三庸醫誤人固不足言有等大行之醫或如時疫瘧痢痘疹感冒大行醫者應接不暇不細辨其本質虛弱或病已將虛或兼舊疾而徒以三指一按以了故事概投以達原飲清脾飲芍藥湯升麻葛根湯麻黃湯桂枝湯小柴胡湯之類恐虛弱之人不能任此一劑也雖最忙時須一一再三斟酌即萬中一錯於心午夜能安乎豫亦素有粗率之病故於藥室座右自撰二語云此間正好種德箇中不厭精思以自警論小兒用藥當預為補計第五十四夫老人血氣枯攪得病易致變虛人所共知至於小兒專門幼科以為純陽之體且多痰滯合成丸散百無一補甚則雜以巴霜牽牛之類始終以之殊不知小兒血氣未充柔脆之極最易變虛較老人更甚也虛症用補固不待言至於一切實症亦當預為補計縱有餘邪未清即當補瀉兼施若直待補期方補恐有措手不及之患矣至於痘疹有始終不用溫補者另有專門不在此論論月季花當通經天竹實當補腎第五十五花之月月能開者受陽氣全也色赤入血刺破血香散血月季花當為血中氣藥凡血瘀經閉者用之必有神效為其有月月紅之義也但質薄而力必微且香入脾必佐以下走血藥方能有效草木之隆冬不凋者受陰氣全也凡子皆入腎天竹隆冬不調其實當與女貞相似至冬始赤具陰中有陽之體又當與枸杞相似但質味俱薄其力較微女貞枸杞也按天竹喜澆人溺與鹹菜滷其入腎可知矣此二說本草未載豫以膚見測之不識有當物理否
