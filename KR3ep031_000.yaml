body:
  text: 附録重梓傷寒論翼序夫寶物之顯晦各有其時如荊山之玉豐城之劍沉埋日久當其時至必有卞和起不平之鳴雖兩刖不辭稱屈而爭雷煥俯求豐城令入獄起沉而出遂令舉世共知為寶以成不朽之名矧夫拯救蒼生夭折之書而為人世之真寶者又豈能終晦而不顯哉傷寒一書出之仲景乃上天垂憫蒼生特簡淵鑑聖醫拯生民之夭折宜如日之麗天健運不息何其越世即泯焉無傳乎晉之叔和得之口授參恭以己撰謬引經文著為序例有誤後人遂有千古魚目混珠之嘆賴後賢方中行喻嘉言程郊倩柯韻伯等卓識過人削僞存真而韻伯更覺天資穎拔所著傷寒論翼將仲景之條渾化而論講一法即以衆法比類而推講之論一方亦以衆方比類而推論之遂覺仲景通身手眼一時畢現使讀者無復膠柱鼓瑟之誚洵仲景之大功臣也宜其萬古重明不致再墜何未幾而棗梨蠹蝕蕩無復存是寶物之顯而復晦者也近有崇川程繩玉先生著傷寒發明一書所遵是書十之七八斷章分注於各條之下使人易明亦善法也但分而不合未免反掩柯氏之心法豫於拙作醫權初編中論之已詳新安羅東逸先生集古今明醫經論證治匯粹八卷為醫林中之至寶今皆泯滅無傳惟此與名醫方論二卷豫次第得之噫醫道掃地久矣繼晦重明此非其時耶舍此八卷其誰與歸茲皆梓以為倡其餘六卷必有同志君子訪集續梓以成全帙大彰斯道於不朽並使羅子之苦心復見於今日也若謂寶物之晦而當顯則可若以吾擬之卞和雷煥抱屈而爭起沉而出者則是冒天功而蹈虛譽則吾豈肯當哉是為序重梓古今名醫方論序古之創為醫者非立極大聖不能其次則鴻儒宿學念天下蒼生惟有拯救夭折為急務故醫道得以洞明造化之理緣有不為良相則為良醫之說為其在德不在利也今之號為醫者其上智之士志在讀書干祿致身華膴不屑屑於茲中智之士每改業學醫其才智可想見矣甚有僅識之乎而文理全然不曉亦濫竽於其間者故有習醫廢人與不服藥得中醫之誚以其在利而不在德也蓋醫之理即經綸之理治天下不明其道則荼毒者衆習醫不明其道則慘殺者多又何以治天下以上智習醫以中智以下之人哉設使聖天子加以賞罰以衡文之法衡之吾恐岐黃之徒無孑遺矣我朝新安羅東逸先生集古今明醫經論證治匯粹八卷含英咀華探奇摘錦為醫林中最上乘觀其匯粹二字其微妙可想見一斑宜其一燈遠紹永覺醫人奈何甫一世而即泯滅無傳此無他為其義理奧妙非淺人所能問津以陽春白雪而和之自寡聽其淪沒而不復問耳無怪乎鄙俚淺近之書戶傳家誦而不朽也將謂叔和為古之太醫雖謬而亦真東逸為今之韋布雖真而亦謬耶是皆中人以下之才識而以成敗論人也醫道可勝嘆哉若有奇傑之士志在乎立德而不在利祿之謀以之習醫而不能明乎道者未之有也是書豫得二卷一曰傷寒論翼乃柯韻伯先生所著豫已序之矣一曰名醫方論乃彙集古今醫方之明論者意在絲絲入扣辨析微茫最忌似是而非毫釐千里其文理暢茂辭句雅馴又其餘事耳茲皆梓以倡世欲天下同志之士訪集續梓以成全美俾醫者見之知斯道之難鼓勇精進切劘淬礪自可盡造乎古儒醫之流功德與相業相參尚何有習醫廢人與不服藥為得中醫之誚也哉是為序擬黜巫狀為體仁贊化黜邪崇正事切思佛老之教已屬異端而殺人之慘流風之惡未有如巫教之甚者也巫教之甚行又在於江海一帶蓋此地之民不學無術易感於鬼祟神怪藜藿者病多外感必或寒或熱日輕夜重甚則譫妄錯亂渠不審其病情所致謬認邪祟即先請巫跳神名曰救患巫者假冒諸神傳體甚有以東獄關聖自居者罪不容誅裸體蹈舞捉刀登壇叱吒咆哮作惡神狀覬覦病家少覺溫飽便誑曰此災星甚狠神家難保衆悚叩懇壇下准以燒豬巫方許其生蓋燒豬則用二三四巫有過關跳闕招魂捉鬼送瘟諸事又有設物吐紙懸杯舞刀劚刀諸劇以悅人觀徹夜為度所費不資面每巫重得一兩輕得五錢若病輕將退適湊其巧則歸功於巫若病重不應不憚數數為之有病不死而值巫跳舞叱吒於榻前魂魄驚散而死者有汗方出因噀冷法水復閉汗而死者有因鑼鼓喧闐通夜不寐水愈竭而火愈熾而死者有因食跳神之酒肉而死者皆巫殺之也至終不能愈方議延醫但此時財殫力痡何能再延醫治即醫延至而病已入膏肓雖神丹莫救亦巫殺之也反嗤之曰某跳神得生某延醫反死殊不知跳神而愈者病輕而日淺延醫而死者病重而日深又信卜神求籤巫預賂其解簽者曰神不準服藥但許作福作福者跳神之別名噫巫何黠而民何愚耶此信巫下信醫之所由來也病者畏藥之苦口多不肯服而鄉灶之家素不御酒肉一則無錢二則恐有乾餱失德之愆一見患病者便涎流莫禁皆借救患之名而醵分跳神名曰鬥保每以十三人為期以仿十三太保之諺云可多而不可少歡乎聚飲必使酒無餘瀝肉無餘臠云病方能脫體有周姓者僞病臥床鄰人遂醵分跳神周令先與酒肉啖已啖畢大噱而起此豫目擊是志在餔啜假公濟私以所畏而值所好所悅豈不情投意洽遂成惡例不悛耶此好巫不好醫之所由起也聖人以巫醫並言者借言有恆以警人非以巫醫並重也況古之巫誠以禱神今之巫妄以跳神安可以此語並重巫醫哉今之不學者信巫固無足論問有學者亦以此言傅會之可哂也夫蓋醫創自神農軒岐立極大聖繼以伊尹倉公長桑公皇甫謐孫思邈狄梁公等代有傳人不可勝數試問巫者創自何聖繼之何賢乎嗚呼其亦不思而已矣遂令江海一帶竟成鬼怪之俗而巫覡之多倍蓰於屠劌天地以好生為德聖賢以黜邪為任巫術違天地而悖聖賢蠢吾民而殺吾民傷風敗俗陷溺人心罪莫大焉禮云假於鬼神時日卜筮以疑衆殺不以聽律云師巫假降邪神自號端公太保者絞憲天心同天地德並聖賢立功立德贊比體仁舍此誰歸昔西門豹頃殺數巫而怪風除女命得生千古快心伏望憲天大老爺准敕該廉遍示江海一帶諭以禮津嚴行痛禁限以時期速令改業即祈晴禱雨淨獄用此有何功驗並禁延巫之人以罪巫之罪罪之更令以延巫醵分而延醫亦可得以聚飲使病者得其實助又得疾病相扶持之誼豈不勝彼猥舉萬萬哉如此則惡俗化為禮義之鄉地獄改為天堂之境然醫師必先命地方耆士保舉再命老練通醫考中方許行醫不然其風俗雖善於巫而屠戮更甚於巫矣上稟
